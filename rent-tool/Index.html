<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --ink: #17201a;
      --muted: #66706a;
      --line: #d9dfd9;
      --panel: #f7f8f5;
      --accent: #1f6b4a;
      --accent-ink: #ffffff;
      --comfortable: #d9ead3;
      --recommended: #fff2cc;
      --stretch: #fce5cd;
      --high: #f4cccc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #ffffff;
    }

    header {
      padding: 22px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 72px);
    }

    aside {
      padding: 20px;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    section {
      padding: 20px 24px 32px;
      overflow: auto;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select {
      display: block;
      width: 100%;
      height: 40px;
      margin-top: 6px;
      padding: 8px 10px;
      border: 1px solid #c8d0c8;
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font-size: 15px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #ffffff;
      color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #eef3ed;
      z-index: 1;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr.detail td:first-child {
      padding-left: 28px;
      color: var(--muted);
    }

    .zone {
      display: inline-block;
      min-width: 104px;
      padding: 5px 8px;
      border-radius: 999px;
      text-align: center;
      font-weight: 700;
    }

    .Comfortable {
      background: var(--comfortable);
    }

    .Recommended {
      background: var(--recommended);
    }

    .Stretch {
      background: var(--stretch);
    }

    .High {
      background: var(--high);
    }

    .note {
      max-width: 920px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>NYC Rent Reality</h1>
  </header>
  <main>
    <aside>
      <form id="rent-form">
        <label>
          Monthly rent
          <input name="monthlyRent" type="number" min="0" step="50" required>
        </label>
        <div class="grid-two">
          <label>
            Person A label
            <input name="personALabel" type="text" required>
          </label>
          <label>
            Person B label
            <input name="personBLabel" type="text" required>
          </label>
        </div>
        <label>
          Person A annual gross income
          <input name="personAIncome" type="number" min="0" step="1000" required>
        </label>
        <label>
          Person B annual gross income
          <input name="personBIncome" type="number" min="0" step="1000" required>
        </label>
        <label>
          Take-home estimate mode
          <select name="filingMode">
            <option value="separate">Estimate separately</option>
            <option value="joint">Estimate as joint household</option>
          </select>
        </label>
        <label>
          Custom Person A share %
          <input name="customPersonAShare" type="number" min="0" max="100" step="1">
        </label>
        <div class="actions">
          <button type="submit">Calculate</button>
          <button class="secondary" type="button" id="write-sheet">Write to Sheet</button>
        </div>
        <div class="status" id="status"></div>
      </form>
    </aside>
    <section>
      <div class="summary" id="summary"></div>
      <div id="results"></div>
      <p class="note" id="source-note"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('rent-form');
    const statusEl = document.getElementById('status');
    let latestRequest = null;
    let latestResult = null;

    function dollars(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 0
      }).format(value || 0);
    }

    function percent(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'percent',
        maximumFractionDigits: 1
      }).format(value || 0);
    }

    function readForm() {
      const data = Object.fromEntries(new FormData(form).entries());
      return {
        monthlyRent: Number(data.monthlyRent),
        personAIncome: Number(data.personAIncome),
        personBIncome: Number(data.personBIncome),
        personALabel: data.personALabel,
        personBLabel: data.personBLabel,
        filingMode: data.filingMode,
        customPersonAShare: Number(data.customPersonAShare)
      };
    }

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function calculate(event) {
      if (event) event.preventDefault();
      latestRequest = readForm();
      setStatus('Calculating...');
      google.script.run
        .withSuccessHandler((result) => {
          latestResult = result;
          render(result);
          setStatus('');
        })
        .withFailureHandler((error) => setStatus(error.message || String(error)))
        .calculateRentScenarios(latestRequest);
    }

    function writeSheet() {
      latestRequest = readForm();
      setStatus('Writing sheet...');
      google.script.run
        .withSuccessHandler((result) => {
          latestResult = result;
          render(result);
          setStatus('Sheet updated.');
        })
        .withFailureHandler((error) => setStatus(error.message || String(error)))
        .writeCurrentScenarioToSheet(latestRequest);
    }

    function render(result) {
      document.getElementById('summary').innerHTML = [
        ['Monthly rent', dollars(result.monthlyRent)],
        ['Annual rent', dollars(result.annualRent)],
        ['Combined gross', dollars(result.household.grossIncome)],
        ['Est. household take-home', dollars(result.household.selectedTakeHome)]
      ].map(([label, value]) => `
        <div class="metric">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join('');

      const rows = [];
      result.rows.forEach((row) => {
        rows.push(rowHtml(row, false));
        if (row.detail) {
          row.detail.forEach((detail) => rows.push(rowHtml(detail, true)));
        }
      });

      document.getElementById('results').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Scenario</th>
              <th>Payer</th>
              <th>Monthly share</th>
              <th>Annual share</th>
              <th>Gross income</th>
              <th>Est. take-home</th>
              <th>Rent % gross</th>
              <th>Rent % take-home</th>
              <th>Zone</th>
              <th>Read</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      `;
      document.getElementById('source-note').textContent = result.sourceNote;
    }

    function rowHtml(row, detail) {
      return `
        <tr class="${detail ? 'detail' : ''}">
          <td>${row.scenario}</td>
          <td>${row.payer}</td>
          <td>${dollars(row.monthlyShare)}</td>
          <td>${dollars(row.annualShare)}</td>
          <td>${dollars(row.grossIncome)}</td>
          <td>${dollars(row.takeHome)}</td>
          <td>${percent(row.rentGrossPct)}</td>
          <td>${percent(row.rentNetPct)}</td>
          <td><span class="zone ${row.zone}">${row.zone}</span></td>
          <td>${row.recommendation}</td>
        </tr>
      `;
    }

    form.addEventListener('submit', calculate);
    document.getElementById('write-sheet').addEventListener('click', writeSheet);

    google.script.run
      .withSuccessHandler((payload) => {
        Object.entries(payload.defaults).forEach(([key, value]) => {
          if (form.elements[key]) form.elements[key].value = value;
        });
        document.getElementById('source-note').textContent = payload.sourceNote;
        calculate();
      })
      .withFailureHandler((error) => setStatus(error.message || String(error)))
      .getDefaults();
  </script>
</body>
</html>
