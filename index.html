<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>◌</title>
  <style>
    :root {
      color-scheme: dark;
      --void: #070806;
      --case: #1d2119;
      --case-hi: #343a2e;
      --case-lo: #0a0b09;
      --edge: #080906;
      --brass: #c6a84b;
      --ember: #ff5c2f;
      --moss: #7fba63;
      --jade: #42e7bb;
      --bone: #d7cfad;
      --blue: #6b7dff;
      --rose: #d74b80;
      --shadow: rgba(0, 0, 0, .58);
      --step: rgba(216, 207, 173, .15);
      --rub: rgba(255,255,255,.035);
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 48% -18%, rgba(198, 168, 75, .2), transparent 34rem),
        radial-gradient(circle at 22% 82%, rgba(66, 231, 187, .07), transparent 24rem),
        radial-gradient(circle at 78% 70%, rgba(255, 92, 47, .045), transparent 24rem),
        linear-gradient(145deg, #11130f, #050604 70%);
    }

    body::before {
      content: "";
      position: fixed;
      width: min(1180px, 92vw);
      height: min(180px, 18vw);
      left: 50%;
      top: calc(50% + 315px);
      transform: translateX(-50%) rotate(-1deg);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,0,0,.78), rgba(0,0,0,.46) 38%, transparent 72%);
      filter: blur(18px);
      pointer-events: none;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(12px, 2vw, 28px);
      perspective: 1200px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button, input {
      appearance: none;
      border: 0;
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    .machine {
      width: min(1050px, 100%);
      aspect-ratio: 1.55;
      min-height: 610px;
      position: relative;
      padding: clamp(16px, 2.2vw, 28px);
      border-radius: 26px;
      background:
        radial-gradient(circle at 14% 9%, rgba(255,255,255,.15), transparent 18%),
        linear-gradient(90deg, rgba(255,255,255,.09), transparent 3%, transparent 96%, rgba(0,0,0,.28)),
        linear-gradient(135deg, rgba(255,255,255,.14), transparent 18%),
        repeating-linear-gradient(108deg, transparent 0 15px, rgba(255,255,255,.018) 16px 17px, transparent 18px 42px),
        linear-gradient(165deg, #424a39, var(--case) 38%, #12150f 74%, #060705);
      box-shadow:
        0 24px 0 #090a07,
        0 32px 0 #050604,
        0 74px 105px rgba(0,0,0,.72),
        -18px 36px 58px rgba(0,0,0,.46),
        inset 0 2px 1px rgba(255,255,255,.22),
        inset 0 7px 10px rgba(255,255,255,.07),
        inset 0 22px 22px rgba(255,255,255,.045),
        inset 0 -22px 28px rgba(0,0,0,.62),
        0 0 0 2px #050604,
        0 0 0 8px #151812,
        0 0 0 11px #050604;
      transform: rotateX(8deg) rotateZ(-1.2deg);
      transform-style: preserve-3d;
    }

    .machine::before,
    .machine::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 18px;
      pointer-events: none;
    }

    .machine::before {
      border: 1px solid rgba(215, 207, 173, .12);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.018),
        inset 0 0 0 9px rgba(0,0,0,.18),
        inset 0 0 34px rgba(0,0,0,.38);
    }

    .machine::after {
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.16), transparent 11%),
        linear-gradient(115deg, transparent 0 48%, rgba(255,255,255,.08) 49%, transparent 54%),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 9%, transparent 72%, rgba(0,0,0,.42)),
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255,255,255,.018) 29px 30px),
        repeating-linear-gradient(0deg, transparent 0 24px, rgba(0,0,0,.09) 25px 26px);
      mix-blend-mode: soft-light;
      opacity: .72;
    }

    .rim {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      border-radius: inherit;
    }

    .rim.left,
    .rim.right {
      top: 20px;
      bottom: -42px;
      width: 38px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 18%, rgba(0,0,0,.34) 82%),
        linear-gradient(90deg, #050604, #20251b 38%, #11140e 62%, #030403);
      box-shadow:
        inset 2px 0 2px rgba(255,255,255,.08),
        inset -4px 0 10px rgba(0,0,0,.62),
        0 18px 26px rgba(0,0,0,.54);
    }

    .rim.left {
      left: -18px;
      transform: skewY(10deg);
    }

    .rim.right {
      right: -18px;
      transform: skewY(-10deg);
    }

    .rim.front {
      left: 26px;
      right: 26px;
      bottom: -39px;
      height: 58px;
      border-radius: 0 0 28px 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 18%),
        linear-gradient(180deg, #20251b, #080906 72%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 36px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.1),
        inset 0 -14px 18px rgba(0,0,0,.64),
        0 19px 28px rgba(0,0,0,.62);
    }

    .feet {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: -55px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: -1;
    }

    .foot {
      width: clamp(84px, 12vw, 138px);
      height: 24px;
      border-radius: 0 0 18px 18px;
      background: linear-gradient(180deg, #0e100b, #020302);
      box-shadow: 0 13px 18px rgba(0,0,0,.62), inset 0 2px 1px rgba(255,255,255,.05);
    }

    .ports {
      position: absolute;
      top: -22px;
      right: 16%;
      display: flex;
      gap: 12px;
      pointer-events: none;
      z-index: -1;
    }

    .port {
      width: 36px;
      height: 22px;
      border-radius: 9px 9px 3px 3px;
      background:
        radial-gradient(circle at 50% 72%, #020302 0 34%, #303529 36% 55%, #070806 57%),
        linear-gradient(180deg, #252a20, #080906);
      box-shadow: inset 0 2px 1px rgba(255,255,255,.08), 0 -4px 10px rgba(0,0,0,.35);
    }

    .port::after {
      content: "";
      display: block;
      width: 16px;
      height: 16px;
      margin: 4px auto 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 58%, #010201 0 42%, #151812 43% 58%, #030403 60%);
      box-shadow: inset 0 2px 2px rgba(255,255,255,.06);
    }

    .screws {
      position: absolute;
      inset: 19px;
      pointer-events: none;
      z-index: 4;
    }

    .screw {
      width: 18px;
      height: 18px;
      position: absolute;
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(255,255,255,.28), transparent 42%),
        radial-gradient(circle at 60% 65%, #10120d, #373d30 66%, #090a07 70%);
      box-shadow: inset 0 2px 2px rgba(255,255,255,.1), inset 0 -3px 3px rgba(0,0,0,.7);
    }

    .screw::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 2px;
      left: 3.5px;
      top: 8px;
      background: rgba(0,0,0,.72);
      transform: rotate(var(--r));
      border-radius: 4px;
    }

    .screw:nth-child(1) { left: 0; top: 0; --r: 22deg; }
    .screw:nth-child(2) { right: 0; top: 0; --r: -28deg; }
    .screw:nth-child(3) { left: 0; bottom: 0; --r: -10deg; }
    .screw:nth-child(4) { right: 0; bottom: 0; --r: 45deg; }

    .surface {
      height: 100%;
      display: grid;
      grid-template-columns: .85fr 1.2fr;
      grid-template-rows: .7fr .9fr .34fr;
      gap: clamp(12px, 1.8vw, 20px);
      position: relative;
      z-index: 1;
      transform: translateZ(16px);
    }

    .well,
    .matrix,
    .plate,
    .banks,
    .glyphs {
      border-radius: 15px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), transparent 10%, transparent 86%, rgba(0,0,0,.46)),
        linear-gradient(145deg, rgba(255,255,255,.07), transparent 28%),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.05), transparent 28%),
        linear-gradient(160deg, #151811, #0c0e0a);
      box-shadow:
        0 7px 0 #060705,
        0 15px 20px rgba(0,0,0,.38),
        0 1px 0 rgba(255,255,255,.06),
        inset 0 0 0 1px rgba(0,0,0,.6),
        inset 0 0 0 5px rgba(255,255,255,.018),
        inset 0 2px 2px rgba(255,255,255,.09),
        inset 0 -10px 16px rgba(0,0,0,.54),
        0 16px 24px rgba(0,0,0,.42);
      border: 1px solid rgba(215,207,173,.12);
      position: relative;
    }

    .well {
      padding: clamp(12px, 1.8vw, 18px);
      display: grid;
      grid-template-rows: .9fr .72fr;
      gap: 14px;
    }

    .orbital {
      position: relative;
      border-radius: 14px;
      background:
        radial-gradient(circle at 50% 48%, rgba(66,231,187,.1), transparent 32%),
        radial-gradient(circle, #080906 0 52%, #1c2119 53% 56%, #090a07 57%);
      box-shadow:
        0 8px 0 #050604,
        0 16px 16px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(215,207,173,.12),
        inset 0 0 0 8px rgba(0,0,0,.28),
        inset 0 0 34px rgba(0,0,0,.8);
      overflow: hidden;
    }

    .orbital::after {
      content: "";
      position: absolute;
      inset: 0;
      background: none;
      pointer-events: none;
    }

    .halo {
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      border: 1px solid rgba(198,168,75,.35);
      box-shadow: 0 0 20px rgba(198,168,75,.18);
      animation: drift 13s linear infinite;
    }

    .halo:nth-child(2) {
      inset: 25% 9%;
      border-color: rgba(66,231,187,.26);
      transform: rotate(62deg);
      animation-duration: 17s;
      animation-direction: reverse;
    }

    .halo:nth-child(3) {
      inset: 7% 28%;
      border-color: rgba(215,207,173,.22);
      transform: rotate(-28deg);
      animation-duration: 23s;
    }

    @keyframes drift {
      to { rotate: 360deg; }
    }

    .eye {
      position: absolute;
      inset: 35%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 32%, rgba(255,255,255,.72), transparent 9%),
        radial-gradient(circle, var(--jade), #174f43 52%, #06110e 62%);
      box-shadow:
        0 0 28px rgba(66,231,187,.34),
        inset 0 -8px 12px rgba(0,0,0,.55);
      transition: transform .08s ease, filter .08s ease;
    }

    .machine.playing .eye {
      filter: brightness(1.35);
      animation: breathe .6s ease-in-out infinite alternate;
    }

    @keyframes breathe {
      from { transform: scale(.95); }
      to { transform: scale(1.08); }
    }

    .transport {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .glyph-button {
      min-height: 62px;
      border-radius: 13px;
      position: relative;
      background:
        radial-gradient(circle at 34% 16%, rgba(255,255,255,.2), transparent 18%),
        linear-gradient(145deg, rgba(255,255,255,.13), transparent 38%),
        linear-gradient(180deg, #3c4435, #171a12 72%, #080906);
      box-shadow:
        0 8px 0 #050604,
        0 14px 18px rgba(0,0,0,.32),
        inset 0 0 0 1px rgba(255,255,255,.06),
        inset 3px 0 3px rgba(255,255,255,.04),
        inset -5px 0 7px rgba(0,0,0,.34),
        inset 0 2px 1px rgba(255,255,255,.18),
        inset 0 -6px 12px rgba(0,0,0,.45);
      transition: transform .08s ease, box-shadow .08s ease, filter .12s ease;
    }

    .glyph-button:active,
    .glyph-button.hot {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 #050604,
        0 7px 10px rgba(0,0,0,.32),
        inset 0 2px 1px rgba(255,255,255,.12),
        inset 0 -4px 10px rgba(0,0,0,.52);
    }

    .glyph-button::before,
    .glyph-button::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
    }

    .play::before {
      width: 0;
      height: 0;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
      border-left: 24px solid var(--jade);
      filter: drop-shadow(0 0 10px rgba(66,231,187,.5));
    }

    .stop::before {
      width: 26px;
      height: 26px;
      background: var(--ember);
      box-shadow: 0 0 12px rgba(255,92,47,.44);
    }

    .mist::before {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 36%, var(--brass) 38% 45%, transparent 47%),
        conic-gradient(from 20deg, transparent 0 12%, var(--brass) 13% 20%, transparent 21% 45%, var(--brass) 46% 55%, transparent 56% 76%, var(--brass) 77% 84%, transparent 85%);
      filter: drop-shadow(0 0 10px rgba(198,168,75,.38));
    }

    .void::before {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 34%, var(--rose) 36% 45%, transparent 47%),
        linear-gradient(var(--rose), var(--rose));
      box-shadow: 0 0 12px rgba(215,75,128,.38);
      clip-path: polygon(46% 0,54% 0,54% 46%,100% 46%,100% 54%,54% 54%,54% 100%,46% 100%,46% 54%,0 54%,0 46%,46% 46%);
    }

    .coil::before {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, transparent 0 12%, var(--moss) 13% 22%, transparent 23% 35%, var(--moss) 36% 48%, transparent 49% 63%, var(--moss) 64% 76%, transparent 77%);
      filter: drop-shadow(0 0 10px rgba(127,186,99,.4));
    }

    .coil::after {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--moss);
      box-shadow: 0 0 12px rgba(127,186,99,.55);
    }

    .blade::before {
      width: 34px;
      height: 34px;
      background: var(--blue);
      clip-path: polygon(50% 0,62% 34%,98% 38%,70% 58%,80% 94%,50% 73%,20% 94%,30% 58%,2% 38%,38% 34%);
      filter: drop-shadow(0 0 10px rgba(107,125,255,.44));
    }

    .matrix {
      grid-column: 2;
      grid-row: 1 / 4;
      padding: clamp(12px, 1.8vw, 20px);
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: clamp(9px, 1.4vw, 15px);
      position: relative;
    }

    .matrix::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.52);
      box-shadow: inset 0 0 24px rgba(0,0,0,.42);
      pointer-events: none;
    }

    .matrix::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      height: 11px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(215,207,173,.2) 0 48px, transparent 49px 62px),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.28));
      box-shadow: inset 0 1px 1px rgba(255,255,255,.16), inset 0 -3px 5px rgba(0,0,0,.5);
      opacity: .62;
      pointer-events: none;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(58px, .46fr) repeat(16, 1fr);
      gap: clamp(5px, .7vw, 9px);
      align-items: center;
    }

    .voice {
      height: 100%;
      min-height: 58px;
      border-radius: 12px;
      position: relative;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 16%, transparent 78%, rgba(0,0,0,.5)),
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.18), transparent 18%),
        radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--c), white 12%), var(--c) 36%, #10120d 39%),
        linear-gradient(145deg, #2a3024, #11140e);
      box-shadow:
        0 10px 0 #050604,
        0 16px 18px rgba(0,0,0,.32),
        inset 0 0 0 1px rgba(255,255,255,.07),
        inset 0 2px 3px rgba(255,255,255,.18),
        inset 0 -10px 13px rgba(0,0,0,.54);
    }

    .voice::before {
      content: "";
      position: absolute;
      inset: 18%;
      background: rgba(0,0,0,.62);
      clip-path: var(--shape);
      box-shadow: inset 0 0 0 999px rgba(0,0,0,.3);
    }

    .voice.selected {
      filter: saturate(1.3) brightness(1.13);
      box-shadow:
        0 7px 0 #050604,
        0 0 22px color-mix(in srgb, var(--c), transparent 35%),
        inset 0 2px 3px rgba(255,255,255,.2),
        inset 0 -10px 13px rgba(0,0,0,.54);
    }

    .step {
      width: 100%;
      height: 100%;
      min-height: 58px;
      border-radius: 10px;
      position: relative;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 18%, transparent 78%, rgba(0,0,0,.52)),
        radial-gradient(circle at 44% 23%, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(145deg, rgba(255,255,255,.11), transparent 34%),
        linear-gradient(180deg, #30362a, #14170f 72%, #070806);
      box-shadow:
        0 9px 0 #050604,
        0 15px 16px rgba(0,0,0,.32),
        inset 0 0 0 1px rgba(255,255,255,.055),
        inset 2px 0 3px rgba(255,255,255,.035),
        inset -4px 0 6px rgba(0,0,0,.46),
        inset 0 2px 1px rgba(255,255,255,.12),
        inset 0 -8px 10px rgba(0,0,0,.58);
    }

    .step::before {
      content: "";
      position: absolute;
      inset: 38%;
      border-radius: 50%;
      background: rgba(215,207,173,.28);
      box-shadow: 0 0 0 1px rgba(0,0,0,.3);
    }

    .step.on {
      background:
        linear-gradient(90deg, rgba(255,255,255,.1), transparent 18%, transparent 78%, rgba(0,0,0,.45)),
        radial-gradient(circle at 50% 36%, color-mix(in srgb, var(--c), white 25%), var(--c) 32%, transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.16), transparent 34%),
        linear-gradient(180deg, #374030, #14170f 72%, #060705);
    }

    .step.on::before {
      inset: 28%;
      background: var(--c);
      box-shadow: 0 0 18px color-mix(in srgb, var(--c), transparent 10%);
    }

    .step.accent::after {
      content: "";
      position: absolute;
      inset: 18%;
      border: 2px solid color-mix(in srgb, var(--c), white 25%);
      border-radius: 28%;
      transform: rotate(45deg);
      box-shadow: 0 0 10px color-mix(in srgb, var(--c), transparent 22%);
    }

    .step.now {
      outline: 2px solid rgba(215,207,173,.58);
      outline-offset: 2px;
      filter: brightness(1.18);
    }

    .step:active,
    .voice:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #050604,
        inset 0 2px 1px rgba(255,255,255,.1),
        inset 0 -4px 9px rgba(0,0,0,.6);
    }

    .plate {
      grid-column: 1;
      grid-row: 2;
      padding: clamp(12px, 1.8vw, 18px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      align-items: center;
    }

    .dial {
      aspect-ratio: 1;
      min-width: 0;
      position: relative;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 20%, rgba(255,255,255,.2), transparent 14%),
        conic-gradient(from 0deg, rgba(0,0,0,.28), transparent 10%, transparent 42%, rgba(255,255,255,.12) 48%, transparent 60%, rgba(0,0,0,.4) 78%, transparent),
        conic-gradient(from -132deg, var(--jade) 0 var(--a), rgba(215,207,173,.12) var(--a) 74%, transparent 74%),
        radial-gradient(circle, #4a5240 0 42%, #151811 43% 60%, #050604 61%);
      box-shadow:
        0 13px 0 #050604,
        0 25px 28px rgba(0,0,0,.52),
        0 0 0 5px rgba(0,0,0,.2),
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 7px 0 8px rgba(255,255,255,.05),
        inset -10px 0 10px rgba(0,0,0,.38),
        inset 0 2px 2px rgba(255,255,255,.2),
        inset 0 -15px 16px rgba(0,0,0,.66);
      cursor: ns-resize;
    }

    .dial::before {
      content: "";
      position: absolute;
      width: 8%;
      height: 33%;
      left: 46%;
      top: 11%;
      border-radius: 999px;
      background: var(--bone);
      box-shadow:
        0 0 10px rgba(215,207,173,.35),
        2px 5px 4px rgba(0,0,0,.35);
      transform-origin: 50% 118%;
      transform: rotate(var(--r));
    }

    .dial::after {
      content: "";
      position: absolute;
      inset: 31%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 30%, rgba(255,255,255,.22), transparent 20%),
        radial-gradient(circle at 50% 60%, #050604 0 28%, transparent 29%),
        linear-gradient(145deg, #12150f, #282e22);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.08),
        inset 0 -7px 9px rgba(0,0,0,.72),
        0 2px 3px rgba(255,255,255,.04);
    }

    .banks {
      grid-column: 1;
      grid-row: 3;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .bank {
      min-height: 58px;
      border-radius: 12px;
      position: relative;
      background:
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.14), transparent 16%),
        linear-gradient(145deg, rgba(255,255,255,.1), transparent 34%),
        linear-gradient(180deg, #31382a, #10120d 74%, #050604);
      box-shadow:
        0 9px 0 #050604,
        0 15px 17px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.06),
        inset 0 2px 1px rgba(255,255,255,.12),
        inset 0 -7px 11px rgba(0,0,0,.48);
    }

    .bank::before {
      content: "";
      position: absolute;
      inset: 25%;
      border-radius: var(--bank-radius, 50%);
      border: 2px solid rgba(215,207,173,.45);
      transform: rotate(var(--bank-turn, 0deg));
    }

    .bank.active {
      background:
        radial-gradient(circle at 50% 48%, rgba(198,168,75,.6), transparent 34%),
        linear-gradient(180deg, #31372a, #10120d);
    }

    .bank.active::before {
      border-color: var(--brass);
      box-shadow: 0 0 14px rgba(198,168,75,.48);
    }

    .glyphs {
      position: absolute;
      left: clamp(22px, 2.6vw, 34px);
      top: clamp(22px, 2.6vw, 34px);
      width: min(250px, 25vw);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      align-content: center;
      opacity: .34;
      pointer-events: none;
      transform: translateZ(8px);
    }

    .sigil {
      aspect-ratio: 1;
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.1), transparent 38%),
        linear-gradient(180deg, #272c21, #0f110c);
      box-shadow:
        0 5px 0 #050604,
        inset 0 1px 1px rgba(255,255,255,.12),
        inset 0 -5px 8px rgba(0,0,0,.48);
      position: relative;
    }

    .sigil::before {
      content: "";
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      border: 2px solid rgba(215,207,173,.36);
      clip-path: polygon(0 0, 100% 0, 100% 72%, 62% 72%, 62% 100%, 38% 100%, 38% 72%, 0 72%);
      transform: rotate(var(--turn));
    }

    .sigil.live {
      background:
        radial-gradient(circle at 50% 50%, var(--jade), transparent 42%),
        linear-gradient(180deg, #303729, #10120d);
      filter: brightness(1.2);
    }

    .meter {
      position: absolute;
      left: clamp(20px, 2.8vw, 36px);
      right: clamp(20px, 2.8vw, 36px);
      bottom: clamp(15px, 2vw, 24px);
      height: 8px;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 6px;
      z-index: 2;
      pointer-events: none;
    }

    .meter i {
      display: block;
      border-radius: 999px;
      background: rgba(215,207,173,.15);
      box-shadow: inset 0 1px 1px rgba(255,255,255,.1);
    }

    .meter i.live {
      background: var(--brass);
      box-shadow: 0 0 12px rgba(198,168,75,.62);
    }

    .fader {
      display: none;
    }

    /* Hardware-panel makeover */
    .machine {
      width: min(1420px, 100%);
      aspect-ratio: 2.1;
      min-height: 560px;
      padding: clamp(18px, 2vw, 30px) clamp(22px, 2.4vw, 38px) clamp(24px, 2.8vw, 42px);
      border-radius: 12px;
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.09), transparent 10%),
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.055), transparent 11%),
        repeating-linear-gradient(2deg, rgba(255,255,255,.015) 0 1px, transparent 1px 6px),
        linear-gradient(180deg, #30342f, #191c18 26%, #10120f 100%);
      box-shadow:
        0 20px 0 #080907,
        0 35px 0 #030403,
        0 70px 95px rgba(0,0,0,.76),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 0 0 2px rgba(255,255,255,.04),
        inset 0 -24px 32px rgba(0,0,0,.7),
        0 0 0 2px #050604,
        0 0 0 8px #151713,
        0 0 0 12px #050604;
      transform: rotateX(4deg) rotateZ(-.35deg);
    }

    .machine::before {
      inset: 14px;
      border-radius: 8px;
      border-color: rgba(218,226,212,.11);
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,.48),
        inset 0 0 0 7px rgba(255,255,255,.025),
        inset 0 -14px 22px rgba(0,0,0,.42);
    }

    .machine::after {
      inset: 0;
      border-radius: 12px;
      background:
        linear-gradient(110deg, transparent 0 52%, rgba(255,255,255,.055) 53%, transparent 58%),
        radial-gradient(circle at 40% 4%, rgba(255,255,255,.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.065), transparent 14%, transparent 78%, rgba(0,0,0,.36));
      opacity: .48;
    }

    .rim.left,
    .rim.right {
      top: 34px;
      bottom: -32px;
      width: 34px;
      border-radius: 18px;
      background:
        linear-gradient(90deg, #050604, #1d211b 34%, #11140f 70%, #020302),
        linear-gradient(180deg, rgba(255,255,255,.12), transparent);
    }

    .rim.left { left: -20px; transform: skewY(4deg); }
    .rim.right { right: -20px; transform: skewY(-4deg); }

    .rim.front {
      left: 34px;
      right: 34px;
      bottom: -34px;
      height: 48px;
      border-radius: 0 0 14px 14px;
      background: linear-gradient(180deg, #171a15, #050604 82%);
    }

    .ports {
      top: -21px;
      left: 16%;
      right: 10%;
      justify-content: space-between;
      gap: 0;
      z-index: -1;
    }

    .port {
      width: 31px;
      height: 22px;
      border-radius: 11px 11px 4px 4px;
      background: linear-gradient(180deg, #232721, #070807);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        inset 0 -6px 8px rgba(0,0,0,.62),
        0 -3px 10px rgba(0,0,0,.52);
    }

    .port::after {
      width: 15px;
      height: 15px;
      margin-top: 4px;
      background: radial-gradient(circle at 50% 52%, #010101 0 38%, #2b3029 40% 56%, #070807 58%);
    }

    .screws {
      inset: 16px;
    }

    .screw {
      width: 20px;
      height: 20px;
      background:
        radial-gradient(circle at 34% 25%, rgba(255,255,255,.9), transparent 14%),
        radial-gradient(circle at 58% 62%, #222621, #757a70 48%, #1b1e19 58%, #070807 72%);
      box-shadow:
        inset 0 2px 1px rgba(255,255,255,.22),
        inset 0 -4px 5px rgba(0,0,0,.72),
        0 2px 4px rgba(0,0,0,.62);
    }

    .surface {
      display: grid;
      grid-template-columns: 1fr 1.08fr 1.05fr;
      grid-template-rows: 1.18fr .88fr .64fr;
      gap: clamp(14px, 1.45vw, 22px);
      transform: translateZ(18px);
    }

    .well,
    .matrix,
    .plate,
    .banks,
    .glyphs,
    .fader {
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), transparent 12%, transparent 82%, rgba(0,0,0,.38)),
        linear-gradient(180deg, #1a1d19, #0a0c0a);
      border: 1px solid rgba(216,224,216,.075);
      box-shadow:
        0 5px 0 #040504,
        0 12px 18px rgba(0,0,0,.36),
        inset 0 0 0 1px rgba(0,0,0,.68),
        inset 0 2px 1px rgba(255,255,255,.07),
        inset 0 -10px 15px rgba(0,0,0,.54);
    }

    .well {
      grid-column: 2;
      grid-row: 1 / 3;
      padding: clamp(13px, 1.4vw, 20px);
      grid-template-rows: 1fr .34fr;
    }

    .orbital {
      border-radius: 5px;
      background:
        linear-gradient(180deg, rgba(232,255,245,.07), transparent 18%, transparent 76%, rgba(0,0,0,.45)),
        repeating-linear-gradient(90deg, transparent 0 18px, rgba(178,255,231,.08) 19px 20px),
        repeating-linear-gradient(0deg, transparent 0 16px, rgba(178,255,231,.07) 17px 18px),
        radial-gradient(circle at 50% 45%, rgba(72,255,203,.18), transparent 22%),
        #030605;
      box-shadow:
        0 8px 0 #030403,
        0 16px 18px rgba(0,0,0,.44),
        inset 0 0 0 8px #080a08,
        inset 0 0 0 10px rgba(205,235,224,.06),
        inset 0 0 42px rgba(0,0,0,.8);
    }

    .halo {
      border-radius: 0;
      border: 0;
      box-shadow: none;
      background: rgba(190,255,233,.42);
      height: 2px;
      inset: 28% 15% auto;
      transform-origin: center;
      animation: scanline 5s linear infinite;
    }

    .halo:nth-child(2) {
      inset: 52% 12% auto;
      background: rgba(198,168,75,.5);
      animation-duration: 7s;
    }

    .halo:nth-child(3) {
      inset: 70% 28% auto;
      background: rgba(255,92,47,.34);
      animation-duration: 9s;
    }

    @keyframes scanline {
      0% { transform: translateX(-18%) scaleX(.45); opacity: .2; }
      45% { opacity: .82; }
      100% { transform: translateX(18%) scaleX(1); opacity: .25; }
    }

    .eye {
      inset: auto 12% 18% auto;
      width: 24px;
      height: 24px;
      border-radius: 3px;
      background: var(--jade);
      box-shadow:
        0 0 16px rgba(66,231,187,.62),
        inset 0 2px 2px rgba(255,255,255,.34),
        inset 0 -5px 7px rgba(0,0,0,.46);
    }

    .transport {
      grid-template-columns: repeat(6, minmax(38px, 1fr));
      gap: 9px;
      align-items: end;
    }

    .glyph-button,
    .bank {
      min-height: 54px;
      border-radius: 7px;
      background:
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.16), transparent 15%),
        linear-gradient(180deg, #2b302a, #131613 68%, #050605);
      box-shadow:
        0 7px 0 #020302,
        0 11px 13px rgba(0,0,0,.38),
        inset 0 0 0 1px rgba(235,245,235,.055),
        inset 0 2px 1px rgba(255,255,255,.1),
        inset 0 -8px 10px rgba(0,0,0,.62);
    }

    .play::before {
      border-top-width: 12px;
      border-bottom-width: 12px;
      border-left-width: 20px;
    }

    .stop::before {
      width: 22px;
      height: 22px;
    }

    .plate {
      grid-column: 3;
      grid-row: 1;
      grid-template-columns: repeat(3, minmax(72px, 1fr));
      grid-template-rows: repeat(2, minmax(72px, 1fr));
      gap: clamp(16px, 1.8vw, 28px);
      padding: clamp(16px, 1.8vw, 28px);
      align-items: center;
      justify-items: center;
    }

    .dial {
      width: min(88px, 100%);
      max-width: 88px;
      box-shadow:
        0 8px 0 #050605,
        0 18px 22px rgba(0,0,0,.5),
        0 0 0 8px rgba(0,0,0,.26),
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 3px 3px rgba(255,255,255,.14),
        inset 0 -12px 14px rgba(0,0,0,.68);
      background:
        radial-gradient(circle at 32% 18%, rgba(255,255,255,.22), transparent 14%),
        conic-gradient(from -132deg, rgba(215,207,173,.18) 0 74%, transparent 74%),
        conic-gradient(from -132deg, var(--jade) 0 var(--a), transparent var(--a)),
        radial-gradient(circle, #444944 0 47%, #171a17 48% 64%, #050605 65%);
    }

    .banks {
      grid-column: 1;
      grid-row: 2;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      align-items: stretch;
      padding: clamp(14px, 1.5vw, 20px);
    }

    .glyphs {
      grid-column: 1;
      grid-row: 1;
      position: relative;
      left: auto;
      top: auto;
      width: auto;
      opacity: 1;
      padding: clamp(14px, 1.5vw, 20px);
      pointer-events: none;
      grid-template-columns: repeat(5, 1fr);
      grid-auto-rows: 1fr;
      align-content: stretch;
    }

    .sigil {
      border-radius: 6px;
      background:
        radial-gradient(circle at 36% 20%, rgba(255,255,255,.13), transparent 18%),
        linear-gradient(180deg, #252a25, #111411 74%, #050605);
      box-shadow:
        0 6px 0 #020302,
        0 10px 12px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.045),
        inset 0 2px 1px rgba(255,255,255,.08),
        inset 0 -7px 9px rgba(0,0,0,.6);
    }

    .sigil::before {
      inset: 31%;
      border-color: rgba(206,220,210,.5);
      border-width: 2px;
    }

    .matrix {
      grid-column: 1 / 4;
      grid-row: 3;
      padding: clamp(12px, 1.35vw, 18px);
      grid-template-rows: repeat(4, minmax(38px, 1fr));
      gap: clamp(8px, .8vw, 12px);
    }

    .row {
      grid-template-columns: minmax(62px, .45fr) repeat(16, minmax(35px, 1fr));
      gap: clamp(6px, .58vw, 9px);
    }

    .voice {
      min-height: 42px;
      border-radius: 7px;
      box-shadow:
        0 7px 0 #020302,
        0 12px 14px rgba(0,0,0,.36),
        inset 0 0 0 1px rgba(255,255,255,.055),
        inset 0 2px 1px rgba(255,255,255,.12),
        inset 0 -8px 10px rgba(0,0,0,.62);
    }

    .step {
      min-height: 42px;
      border-radius: 6px;
      background:
        radial-gradient(circle at 36% 18%, rgba(255,255,255,.12), transparent 15%),
        linear-gradient(180deg, #282d27, #121512 72%, #050605);
      box-shadow:
        0 7px 0 #020302,
        0 11px 13px rgba(0,0,0,.34),
        inset 0 0 0 1px rgba(255,255,255,.045),
        inset 0 2px 1px rgba(255,255,255,.08),
        inset 0 -7px 9px rgba(0,0,0,.6);
    }

    .step::before {
      inset: 41% 32%;
      border-radius: 999px;
      background: rgba(210,222,212,.22);
    }

    .step.on::before {
      inset: 29% 25%;
      border-radius: 4px;
    }

    .fader {
      display: block;
      grid-column: 3;
      grid-row: 2;
      align-self: stretch;
      padding: 22px 44px;
      position: relative;
    }

    .fader::before {
      content: "";
      position: absolute;
      left: 11%;
      right: 11%;
      top: 50%;
      height: 12px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: linear-gradient(180deg, #020302, #111411 55%, #050605);
      box-shadow:
        inset 0 2px 3px rgba(0,0,0,.85),
        inset 0 -1px 1px rgba(255,255,255,.08),
        0 0 0 1px rgba(255,255,255,.055);
    }

    .fader::after {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      top: calc(50% - 42px);
      height: 84px;
      background: repeating-linear-gradient(90deg, transparent 0 18px, rgba(204,226,216,.18) 19px 21px, transparent 22px 36px);
      opacity: .45;
      pointer-events: none;
    }

    .fader i {
      position: absolute;
      left: calc(var(--x, 50) * 1%);
      top: 50%;
      width: 36px;
      height: 86px;
      transform: translate(-50%, -50%);
      border-radius: 9px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.18), transparent 18%, transparent 72%, rgba(0,0,0,.46)),
        linear-gradient(180deg, #d8ded6, #56605a 16%, #1b1f1b 50%, #070807 52%, #d8ded6 100%);
      box-shadow:
        0 14px 18px rgba(0,0,0,.55),
        inset 0 0 0 1px rgba(255,255,255,.22),
        inset 0 -9px 11px rgba(0,0,0,.55);
      z-index: 2;
    }

    .meter {
      bottom: clamp(8px, 1.2vw, 16px);
      left: clamp(34px, 3.2vw, 48px);
      right: clamp(34px, 3.2vw, 48px);
      height: 6px;
      opacity: .7;
    }

    /* Button-cap refinement */
    .glyph-button,
    .bank,
    .sigil,
    .voice,
    .step {
      background:
        radial-gradient(circle at 30% 14%, rgba(255,255,255,.13), transparent 15%),
        linear-gradient(180deg, #303430, #171a17 58%, #0a0c0a);
      border: 1px solid rgba(255,255,255,.035);
      box-shadow:
        0 8px 0 #020302,
        0 15px 18px rgba(0,0,0,.45),
        inset 0 0 0 1px rgba(255,255,255,.045),
        inset 0 3px 2px rgba(255,255,255,.08),
        inset 0 -9px 12px rgba(0,0,0,.68);
    }

    .glyph-button::after,
    .bank::after,
    .sigil::after,
    .voice::after,
    .step::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      top: 11%;
      height: 46%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.012));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      pointer-events: none;
    }

    .bank::before,
    .sigil::before,
    .voice::before,
    .step::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 10%;
      width: 11px;
      height: 5px;
      border: 0;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(205,218,207,.24);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.44),
        inset 0 1px 1px rgba(255,255,255,.16);
      clip-path: none;
    }

    .step.on::before,
    .bank.active::before,
    .sigil.live::before,
    .voice.selected::before {
      inset: auto;
      left: 50%;
      bottom: 10%;
      width: 16px;
      height: 6px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: var(--c, var(--brass));
      box-shadow:
        0 0 14px color-mix(in srgb, var(--c, var(--brass)), transparent 18%),
        0 0 2px color-mix(in srgb, var(--c, var(--brass)), white 25%),
        inset 0 1px 1px rgba(255,255,255,.35);
    }

    .step.on {
      background:
        radial-gradient(circle at 50% 76%, color-mix(in srgb, var(--c), transparent 50%), transparent 42%),
        radial-gradient(circle at 30% 14%, rgba(255,255,255,.16), transparent 15%),
        linear-gradient(180deg, #353a34, #181c18 58%, #090b09);
    }

    .step.accent::after {
      left: 18%;
      right: 18%;
      top: 16%;
      height: 45%;
      border: 1px solid color-mix(in srgb, var(--c), white 18%);
      border-radius: 5px;
      transform: none;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.01));
      box-shadow:
        0 0 10px color-mix(in srgb, var(--c), transparent 35%),
        inset 0 0 0 1px rgba(0,0,0,.3);
    }

    .voice {
      background:
        radial-gradient(circle at 50% 74%, color-mix(in srgb, var(--c), transparent 68%), transparent 40%),
        radial-gradient(circle at 30% 14%, rgba(255,255,255,.13), transparent 15%),
        linear-gradient(180deg, #303430, #171a17 58%, #0a0c0a);
    }

    .voice::before {
      width: 18px;
      height: 6px;
      bottom: 11%;
      background: color-mix(in srgb, var(--c), #283028 55%);
    }

    .voice.selected::before {
      width: 20px;
      bottom: 11%;
      background: color-mix(in srgb, var(--c), white 12%);
    }

    .voice::after {
      left: 22%;
      right: 22%;
      top: 21%;
      height: 34%;
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--c), white 10%);
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.012));
    }

    .bank {
      overflow: visible;
    }

    .bank::before {
      width: 14px;
      height: 6px;
      bottom: 9%;
      transform: translateX(-50%) rotate(0);
      border-radius: 999px;
    }

    .bank.active::before {
      width: 14px;
      bottom: 9%;
    }

    .bank::after {
      left: 15%;
      right: 15%;
      top: 15%;
      height: 43%;
      border-radius: 6px;
    }

    .bank.active {
      background:
        radial-gradient(circle at 50% 75%, rgba(198,168,75,.28), transparent 44%),
        radial-gradient(circle at 30% 14%, rgba(255,255,255,.16), transparent 15%),
        linear-gradient(180deg, #343831, #181b17 58%, #080a08);
    }

    .sigil::before {
      width: 10px;
      height: 5px;
      bottom: 11%;
      transform: translateX(-50%) rotate(0);
      border-radius: 999px;
    }

    .sigil.live::before {
      width: 10px;
      bottom: 11%;
    }

    .sigil::after {
      left: 24%;
      right: 24%;
      top: 23%;
      height: 30%;
      border-radius: 5px;
      border: 1px solid rgba(214,222,214,.22);
      background: transparent;
    }

    .glyph-button {
      overflow: hidden;
    }

    .glyph-button::after {
      z-index: 0;
    }

    .glyph-button::before {
      z-index: 1;
      opacity: .86;
    }

    .matte .machine,
    .machine {
      background:
        repeating-linear-gradient(32deg, rgba(255,255,255,.012) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(116deg, transparent 0 3px, rgba(0,0,0,.05) 4px 5px),
        linear-gradient(180deg, #252925, #141714 34%, #0d100d);
    }

    .well,
    .matrix,
    .plate,
    .banks,
    .glyphs,
    .fader {
      background:
        repeating-linear-gradient(34deg, rgba(255,255,255,.01) 0 1px, transparent 1px 5px),
        linear-gradient(180deg, #181b18, #0b0d0b);
    }

    .glyph-button,
    .bank,
    .sigil,
    .voice,
    .step {
      background:
        linear-gradient(180deg, #282c28, #151815 58%, #090b09);
      box-shadow:
        0 8px 0 #020302,
        0 13px 14px rgba(0,0,0,.48),
        inset 0 0 0 1px rgba(255,255,255,.032),
        inset 0 2px 1px rgba(255,255,255,.045),
        inset 0 -8px 10px rgba(0,0,0,.68);
    }

    .glyph-button::after,
    .bank::after,
    .sigil::after,
    .voice::after,
    .step::after {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.006));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.018);
    }

    .step.on,
    .bank.active {
      background:
        radial-gradient(circle at 50% 78%, color-mix(in srgb, var(--c, var(--brass)), transparent 72%), transparent 38%),
        linear-gradient(180deg, #2b302b, #151815 58%, #080a08);
    }

    .eye {
      box-shadow:
        0 0 8px rgba(66,231,187,.34),

        repeating-linear-gradient(30deg, rgba(255,255,255,.002) 0 1px, transparent 1px 5px),

    .glyph-button,

    .bank::before,

    .play::before,
    .stop::before,

    .dial {

    .screen-bar .limit,

    .screen-bar.voice-tinted {

    .dial::before {

    .screen-bar.source-preview {

    @keyframes rec-pulse {

    /* Proportion refinement */
    .machine {
      width: min(700px, 96vw);

    .surface {

    .well {

      background:
        conic-gradient(from 220deg, rgba(255,255,255,.02), transparent 14%, transparent 74%, rgba(0,0,0,.28)),

      box-shadow:

      height: 30%;

    }

    .dial::after {
      inset: 34%;
      background: radial-gradient(circle, #111411 0%, #0a0c0a 100%);
      box-shadow: inset 0 0 3px rgba(0,0,0,.8);
    }

    /* Encoder-under-display layout */
    .machine {
      width: min(690px, 96vw);
      aspect-ratio: 1.82;
    }

    .surface {
      grid-template-columns: .7fr 1fr;
      grid-template-rows: .55fr .28fr .9fr;
      gap: 8px;
    }

    .well {
      grid-column: 1;
      grid-row: 1;
      display: block;

    }

      grid-row: 2;

      max-width: 28px;

      height: 29%;

    }

    .transport,

        repeating-linear-gradient(30deg, rgba(255,255,255,.002) 0 1px, transparent 1px 5px),

      box-shadow:
        0 3px 0 #020302,
        0 7px 10px rgba(0,0,0,.48),

        inset 0 -7px 10px rgba(0,0,0,.66);
    }

    .transport {
      grid-column: 2;
      grid-row: 1;
      padding: 8px;

      gap: 7px;
      align-content: center;
    }

    .banks {
      grid-column: 2;
      grid-row: 2;
      padding: 5px 9px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 1fr;
      gap: 8px;
      align-content: center;
    }

    .matrix {
      grid-column: 1 / 3;
      grid-row: 3;
      padding: 7px;
    }

    .machine {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      transform: rotateX(calc(8deg + var(--tilt-y))) rotateY(var(--tilt-x)) rotateZ(-1.2deg);
      transition: transform .18s ease-out;
    }

    .glyph-button:active,
    .bank:active,
    .voice:active,
    .step:active {
      transform: translateY(2px);
      box-shadow:
        0 1px 0 #010201,

        inset 0 -3px 5px rgba(0,0,0,.82);

        0 3px 0 #010201,
