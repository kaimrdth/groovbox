        inset 0 -4px 6px rgba(0,0,0,.78);
    }

    .step.locked::before {
      clip-path: polygon(50% 13%, 58% 42%, 88% 42%, 63% 59%, 73% 88%, 50% 70%, 27% 88%, 37% 59%, 12% 42%, 42% 42%);
    }

    .step.chance:not(.now)::before {
      opacity: calc(.18 + var(--chance) * .58);
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
        place-items: start center;
      }

      .machine {
        min-height: 880px;
        aspect-ratio: auto;
        transform: rotateX(3deg);
      }

      .surface {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
      }

      .matrix {
        grid-column: 1;
        grid-row: auto;
      }

      .row {
        grid-template-columns: minmax(46px, .55fr) repeat(8, 1fr);
        grid-auto-flow: row;
      }

      .step,
      .voice {
        min-height: 42px;
      }

      .plate {
        grid-template-columns: repeat(3, minmax(74px, 1fr));
      }

      .transport {
        grid-template-columns: repeat(6, 1fr);
      }

      .glyphs {
        display: none;
      }

      .banks {
        grid-column: 1;
        grid-row: auto;
      }
    }
  </style>
</head>
<body>
  <main class="machine" id="machine">
    <i class="rim left"></i>
    <i class="rim right"></i>
    <i class="rim front"></i>
    <div class="screws" aria-hidden="true">
      <i class="screw"></i><i class="screw"></i><i class="screw"></i><i class="screw"></i>
    </div>

    <section class="surface">
      <div class="well">
        <div class="orbital" aria-hidden="true">
          <div class="screen-bars" id="screenBars"></div>
        </div>
      </div>

      <div class="transport">
        <button class="glyph-button play" data-act="play" aria-label="start"></button>
        <button class="glyph-button stop" data-act="stop" aria-label="stop"></button>
        <button class="glyph-button mist" data-act="random" aria-label="shuffle"></button>
        <button class="glyph-button void" data-act="clear" aria-label="clear"></button>
        <button class="glyph-button coil" data-act="fill" aria-label="fill"></button>
        <button class="glyph-button blade" data-act="shift" aria-label="shift"></button>
      </div>

      <div class="plate">
        <div class="dial" data-dial="tempo" style="--a: 43%; --r: -24deg" role="slider" aria-label="tempo"></div>
        <div class="dial" data-dial="swing" style="--a: 20%; --r: -84deg" role="slider" aria-label="swing"></div>
        <div class="dial" data-dial="tune" style="--a: 55%; --r: 12deg" role="slider" aria-label="tune"></div>
        <div class="dial" data-dial="decay" style="--a: 42%; --r: -20deg" role="slider" aria-label="decay"></div>
        <div class="dial" data-dial="grit" style="--a: 18%; --r: -90deg" role="slider" aria-label="grit"></div>
        <div class="dial" data-dial="echo" style="--a: 8%; --r: -112deg" role="slider" aria-label="echo"></div>
      </div>

      <div class="banks" id="banks" aria-label="memory"></div>

      <div class="matrix" id="matrix" aria-label="sequencer"></div>

    </section>

  </main>

  <script>
    const voices = [
      { color: "#e85d3a", shape: "polygon(50% 0,92% 24%,92% 76%,50% 100%,8% 76%,8% 24%)", pattern: [0,4,8,12] },
      { color: "#d4c898", shape: "polygon(0 44%,44% 44%,44% 0,56% 0,56% 44%,100% 44%,100% 56%,56% 56%,56% 100%,44% 100%,44% 56%,0 56%)", pattern: [4,12] },
      { color: "#38d4be", shape: "polygon(50% 0,62% 35%,100% 50%,62% 65%,50% 100%,38% 65%,0 50%,38% 35%)", pattern: [2,6,10,14] },
      { color: "#5c7cf0", shape: "polygon(50% 3%,64% 36%,98% 36%,71% 57%,82% 92%,50% 72%,18% 92%,29% 57%,2% 36%,36% 36%)", pattern: [7,15] }
    ];
    const bankColors = ["#d4a030", "#d84888", "#78c838", "#a878e8"];
    const SYNTH_COUNT = 10;
    const ROM_SAMPLE_COUNT = 28;
    const USER_SAMPLE_COUNT = 8;
    const SAMPLE_COUNT = ROM_SAMPLE_COUNT + USER_SAMPLE_COUNT;

    function clamp01(v) { return Math.min(1, Math.max(0, v)); }

    const state = {
      steps: voices.map(v => Array.from({ length: 16 }, (_, i) => v.pattern.includes(i))),
      accents: voices.map(() => Array(16).fill(false)),
      probabilities: voices.map(() => Array(16).fill(1)),
      locks: emptyLockGrid(),
      selected: 0,
      activeBank: 0,
      fill: false,
      current: -1,
      nextStep: 0,
      nextStepTime: 0,
      playing: false,
      tempo: 116,
      swing: .1,
      voiceParams: [
        { engine: 0, tune: .45, decay: .62, grit: .12, echo: .04, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
        { engine: 1, tune: .55, decay: .48, grit: .22, echo: .10, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
        { engine: 2, tune: .60, decay: .30, grit: .08, echo: .18, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
        { engine: 3, tune: .50, decay: .55, grit: .15, echo: .12, sampleStart: 0, sampleEnd: 1, samplePitch: .5 }
      ],
      sourceMode: null,
      lockTarget: null,
      recording: false,
      sampleBuffers: Array(SAMPLE_COUNT).fill(null),
      nextSampleSlot: 0,
      timer: null,
      visualTimers: [],
      ctx: null,
      master: null,
      limiter: null,
      voiceShapers: [],
      echoSends: [],
      delay: null,
      feedback: null,
      wet: null,
      mediaStream: null,
      recorder: null,
      recordChunks: [],
      banks: []
    };

    const machine = document.getElementById("machine");
    const matrix = document.getElementById("matrix");
    const banks = document.getElementById("banks");
    const screenBars = document.getElementById("screenBars");

    function cloneGrid(grid) {
      return grid.map(row => row.slice());
    }

    function emptyLockGrid() {
      return voices.map(() => Array.from({ length: 16 }, () => ({})));
    }

    function cloneLockGrid(grid) {
      return voices.map((_, row) =>
        Array.from({ length: 16 }, (_, col) => ({ ...(grid?.[row]?.[col] || {}) }))
      );
    }

    const defaultVoiceParams = [
      { engine: 0, tune: .45, decay: .62, grit: .12, echo: .04, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
      { engine: 1, tune: .55, decay: .48, grit: .22, echo: .10, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
      { engine: 2, tune: .60, decay: .30, grit: .08, echo: .18, sampleStart: 0, sampleEnd: 1, samplePitch: .5 },
      { engine: 3, tune: .50, decay: .55, grit: .15, echo: .12, sampleStart: 0, sampleEnd: 1, samplePitch: .5 }
    ];

    function makeBank(seed) {
      const steps = voices.map((voice, row) =>
        Array.from({ length: 16 }, (_, col) => {
          const base = voice.pattern.includes((col + seed * (row + 1)) % 16);
          const off = (col * (row + 3) + seed * 5) % (row + 4) === 0;
          return base || off && col % 2 === row % 2;
        })
      );
      const accents = voices.map((_, row) =>
        Array.from({ length: 16 }, (_, col) => steps[row][col] && (col + row + seed) % 5 === 0)
      );
      const probabilities = voices.map(() => Array(16).fill(1));
      const locks = emptyLockGrid();
      const voiceParams = defaultVoiceParams.map((bp, i) => ({
        engine: bp.engine,
        tune:  clamp01(bp.tune  + seed * .08 * (i % 2 ? 1 : -1)),
        decay: clamp01(bp.decay + seed * .05 * (i % 3 ? -1 : 1)),
        grit:  clamp01(bp.grit  + seed * .04),
        echo:  clamp01(bp.echo  + seed * .03 * (i % 2 ? 1 : -1)),
        sampleStart: 0, sampleEnd: 1, samplePitch: .5
      }));
      return { steps, accents, probabilities, locks, voiceParams };
    }

    state.banks = [0, 1, 2, 3].map(makeBank);
    state.banks[0] = {
      steps: cloneGrid(state.steps),
      accents: cloneGrid(state.accents),
      probabilities: cloneGrid(state.probabilities),
      locks: cloneLockGrid(state.locks),
      voiceParams: state.voiceParams.map(vp => ({ ...vp }))
    };

    function initAudio() {
      if (state.ctx) return;
      state.ctx = new (window.AudioContext || window.webkitAudioContext)();
      state.master = state.ctx.createGain();
      state.limiter = state.ctx.createDynamicsCompressor();
      state.master.gain.value = .78;
      state.limiter.threshold.value = -12;
      state.limiter.knee.value = 18;
      state.limiter.ratio.value = 7;
      state.limiter.attack.value = .003;
      state.limiter.release.value = .16;
      state.delay = state.ctx.createDelay(.8);
      state.feedback = state.ctx.createGain();
      state.wet = state.ctx.createGain();
      state.delay.delayTime.value = .19;
      state.feedback.gain.value = .32;
      state.master.connect(state.limiter);
      state.limiter.connect(state.ctx.destination);
      state.delay.connect(state.feedback);
      state.feedback.connect(state.delay);
      state.delay.connect(state.wet);
      state.wet.connect(state.ctx.destination);

      state.voiceShapers = [];
      state.echoSends = [];
      for (let i = 0; i < 4; i++) {
        const shaper = state.ctx.createWaveShaper();
        shaper.oversample = "2x";
        shaper.curve = curve(state.voiceParams[i].grit);
        shaper.connect(state.master);
        const echoSend = state.ctx.createGain();
        echoSend.gain.value = state.voiceParams[i].echo * .42;
        shaper.connect(echoSend);
        echoSend.connect(state.delay);
        state.voiceShapers.push(shaper);
        state.echoSends.push(echoSend);
      }
      seedRomSamples();
    }

    function curve(amount) {
      const n = 512;
      const data = new Float32Array(n);
      const k = amount * 42;
      for (let i = 0; i < n; i++) {
        const x = i * 2 / n - 1;
        data[i] = (1 + k) * x / (1 + k * Math.abs(x));
      }
      return data;
    }

    function updateFx() {
      if (!state.ctx) return;
      for (let i = 0; i < 4; i++) updateVoiceFx(i);
    }

    function updateVoiceFx(i) {
      if (!state.ctx) return;
      const vp = state.voiceParams[i];
      if (state.voiceShapers[i]) state.voiceShapers[i].curve = curve(vp.grit);
      if (state.echoSends[i]) {
        state.echoSends[i].gain.setTargetAtTime(vp.echo * .42, state.ctx.currentTime, .02);
      }
    }

    function seeded(seed) {
      let x = seed >>> 0;
      return () => {
        x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
        return ((x >>> 0) / 4294967295) * 2 - 1;
      };
    }

    function seedRomSamples() {
      if (!state.ctx || state.sampleBuffers[0]) return;
      const makers = [
        () => renderHit(.62, (i, p) => sineDrop(i, p, 150, 38, 8) + clickSample(i, p, .012, .55), 11),
        () => renderHit(.48, (i, p) => sineDrop(i, p, 92, 33, 6) + clickSample(i, p, .018, .36), 13),
        () => renderHit(.34, (i, p) => sineDrop(i, p, 210, 54, 12) * .72 + clickSample(i, p, .009, .42), 17),
        () => renderHit(.34, (i, p) => snareSample(i, p, 21, 178, .95, .74), 21),
        () => renderHit(.30, (i, p) => snareSample(i, p, 23, 224, .72, .55), 23),
        () => renderHit(.18, (i, p) => noiseBurst(i, p, 29, 9, 6200), 29),
        () => renderHit(.08, (i, p) => noiseBurst(i, p, 31, 15, 8800), 31),
        () => renderHit(.30, (i, p) => clapSample(i, p, 37), 37),
        () => renderHit(.09, (i, p) => squareTone(i, p, 1200, 18) * .75 + clickSample(i, p, .006, .45), 41),
        () => renderHit(.38, (i, p) => sineDrop(i, p, 132, 52, 5) + clickSample(i, p, .014, .25), 43),
        () => renderHit(.24, (i, p) => sineDrop(i, p, 420, 130, 14) * .6 + noiseBurst(i, p, 47, 8, 2400) * .28, 47),
        () => renderHit(.16, (i, p) => Math.sin(i * .064 + Math.sin(i * .017) * 8) * Math.exp(-p * 7), 53),
        () => renderHit(.13, (i, p) => squareTone(i, p, 540, 7) + squareTone(i, p, 812, 7), 59),
        () => renderHit(.22, (i, p) => Math.sin(i * (.02 + p * .16)) * Math.exp(-p * 3.5), 61),
        () => renderHit(.26, (i, p) => noiseBurst(i, p, 67, 6.8, 3400) * .5 + Math.sin(i * .22) * Math.exp(-p * 11) * .32, 67),
        () => renderHit(.42, (i, p) => sineDrop(i, p, 74, 29, 4.4) + noiseBurst(i, p, 71, 7, 420) * .16, 71),
        () => renderHit(.70, (i, p) => sineDrop(i, p, 188, 46, 10) * 1.1 + sineDrop(i, p, 74, 37, 2.2) * .35 + clickSample(i, p, .006, .7), 73),
        () => renderHit(.52, (i, p) => Math.tanh(sineDrop(i, p, 108, 42, 5.8) * 2.7) * Math.exp(-p * 2.1) + clickSample(i, p, .014, .25), 79),
        () => renderHit(.36, (i, p) => sineDrop(i, p, 82, 49, 2.8) * .78 + noiseBurst(i, p, 83, 10, 680) * .25, 83),
        () => renderHit(.28, (i, p) => snareSample(i, p, 89, 164, 1.15, .48), 89),
        () => renderHit(.22, (i, p) => snareSample(i, p, 97, 246, .9, .38), 97),
        () => renderHit(.42, (i, p) => snareSample(i, p, 101, 138, .62, .9), 101),
        () => renderHit(.045, (i, p) => metallicCluster(i, p, [6220, 7030, 8120, 9310], 30) + noiseBurst(i, p, 103, 32, 9500) * .45, 103),
        () => renderHit(.24, (i, p) => metallicCluster(i, p, [5200, 5880, 6700, 8120, 9100], 8.5) + noiseBurst(i, p, 107, 9, 8200) * .34, 107),
        () => renderHit(.62, (i, p) => metallicCluster(i, p, [3100, 3860, 4650, 6210], 3.8) * .72 + noiseBurst(i, p, 109, 3.2, 6800) * .28, 109),
        () => renderHit(.22, (i, p) => clapSample(i, p, 113) * .85 + noiseBurst(i, p, 127, 9.5, 2600) * .35, 113),
        () => renderHit(.16, (i, p) => metallicCluster(i, p, [980, 1470, 2210], 12) + clickSample(i, p, .01, .25), 127),
        () => renderHit(.30, (i, p) => Math.sin(i * (.01 + p * p * .62)) * Math.exp(-p * 4.4) + noiseBurst(i, p, 131, 8, 5000) * .18, 131)
      ];
      makers.forEach((make, i) => state.sampleBuffers[i] = make());
    }

    function renderHit(seconds, sampleFn, seed) {
      const len = Math.max(1, Math.floor(state.ctx.sampleRate * seconds));
      const buf = state.ctx.createBuffer(1, len, state.ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = sampleFn(i, i / len, seed);
      normalizeBuffer(buf);
      return buf;
    }

    function normalizeBuffer(buf) {
      const data = buf.getChannelData(0);
      let peak = 0;
      for (let i = 0; i < data.length; i++) peak = Math.max(peak, Math.abs(data[i]));
      if (peak > .01) {
        const scale = .86 / peak;
        for (let i = 0; i < data.length; i++) data[i] *= scale;
      }
    }

    function sineDrop(i, p, start, end, curveAmt) {
      const f = end + (start - end) * Math.exp(-p * curveAmt);
      return Math.sin(i * f / state.ctx.sampleRate * Math.PI * 2) * Math.exp(-p * 7);
    }

    function sineTone(i, p, freq, decay) {
      return Math.sin(i * freq / state.ctx.sampleRate * Math.PI * 2) * Math.exp(-p * decay);
    }

    function clickSample(i, p, seconds, peak) {
      const env = Math.max(0, 1 - p / Math.max(.001, seconds));
      return Math.sin(i * .72) * env * peak;
    }

    function noiseBurst(i, p, seed, decay, filterish) {
      const rnd = seeded(seed + i)();
      const tone = Math.sin(i * filterish / state.ctx.sampleRate * Math.PI * 2) * .35;
      return (rnd * .65 + tone) * Math.exp(-p * decay);
    }

    function snareSample(i, p, seed, bodyFreq, snap, tail) {
      const rnd = seeded(seed + i * 3)();
      const rattle = seeded(seed * 17 + i * 11)();
      const bodyEnv = Math.exp(-p * 10);
      const wireEnv = Math.exp(-p * (5.2 - tail * 1.6));
      const body =
        Math.sin(i * bodyFreq / state.ctx.sampleRate * Math.PI * 2) * bodyEnv * .58 +
        Math.sin(i * bodyFreq * 1.62 / state.ctx.sampleRate * Math.PI * 2 + .4) * bodyEnv * .2;
      const grit = (rnd * .72 + rattle * .28) * wireEnv;
      const fizz = Math.sin(i * (3400 + snap * 1800) / state.ctx.sampleRate * Math.PI * 2) * rnd * wireEnv * .18;
      const transient = clickSample(i, p, .007 + snap * .004, .58 + snap * .32);
      const earlyWire = Math.exp(-Math.pow((p - .018) * 88, 2)) * rattle * .35;
      return body + grit * (.48 + snap * .3) + fizz + transient + earlyWire;
    }

    function clapSample(i, p, seed) {
      const burst = n => Math.exp(-Math.pow((p - n) * 70, 2));
      return noiseBurst(i, p, seed, 5.2, 1800) * (burst(.035) + burst(.075) + burst(.12) + Math.exp(-Math.max(0, p - .15) * 8) * .55);
    }

    function squareTone(i, p, freq, decay) {
      return (Math.sin(i * freq / state.ctx.sampleRate * Math.PI * 2) > 0 ? 1 : -1) * Math.exp(-p * decay) * .45;
    }

    function metallicCluster(i, p, freqs, decay) {
      const sum = freqs.reduce((acc, freq, n) => {
        const phase = n * .47;
        return acc + Math.sin(i * freq / state.ctx.sampleRate * Math.PI * 2 + phase) / freqs.length;
      }, 0);
      return sum * Math.exp(-p * decay);
    }

    function envGain(t, peak, decay) {
      const g = state.ctx.createGain();
      g.gain.setValueAtTime(.0001, t);
      g.gain.exponentialRampToValueAtTime(peak, t + .008);
      g.gain.exponentialRampToValueAtTime(.0001, t + decay);
      return g;
    }

    // --- Engine definitions ---
    // Each engine: { play(ctx, t, vp, force, out) }
    // vp = voiceParams, force = accent multiplier, out = destination gain node

    const synthEngines = [
      // 0: Kick — sine pitch drop + click
      { play(ctx, t, vp, force, out) {
        const tone = .65 + vp.tune * 1.6;
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime((148 + vp.grit * 28) * tone, t);
        osc.frequency.exponentialRampToValueAtTime(38 + vp.tune * 14, t + .14);
        osc.connect(out); osc.start(t); osc.stop(t + .5);
        click(t, .03, .22 * force, out);
      }},
      // 1: Snare — membrane body + snare-wire noise + crack
      { play(ctx, t, vp, force, out) {
        synthSnare(t, vp, force, out);
      }},
      // 2: Hat — highpass noise
      { play(ctx, t, vp, force, out) {
        noise(t, .05 + vp.decay * .08, out, 5200 + vp.tune * 6500, "highpass");
      }},
      // 3: Perc — triangle pitch drop
      { play(ctx, t, vp, force, out) {
        const tone = .65 + vp.tune * 1.6;
        const osc = ctx.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(260 * tone, t);
        osc.frequency.exponentialRampToValueAtTime(112 * tone, t + .18);
        osc.connect(out); osc.start(t); osc.stop(t + .36);
      }},
      // 4: Rim — short high square click
      { play(ctx, t, vp, force, out) {
        const osc = ctx.createOscillator();
        osc.type = "square";
        osc.frequency.setValueAtTime(800 + vp.tune * 1200, t);
        osc.connect(out); osc.start(t); osc.stop(t + .015 + vp.decay * .02);
        const osc2 = ctx.createOscillator();
        osc2.type = "sine";
        osc2.frequency.setValueAtTime(1600 + vp.tune * 800, t);
        osc2.connect(out); osc2.start(t); osc2.stop(t + .008);
      }},
      // 5: Tom — sine drop, longer and deeper
      { play(ctx, t, vp, force, out) {
        const tone = .65 + vp.tune * 1.2;
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime((95 + vp.tune * 80) * tone, t);
        osc.frequency.exponentialRampToValueAtTime(32 + vp.tune * 18, t + .22);
        osc.connect(out); osc.start(t); osc.stop(t + .6);
        click(t, .02, .12 * force, out);
      }},
      // 6: Clap — layered noise bursts with pre-delay
      { play(ctx, t, vp, force, out) {
        const gap = .012 + vp.tune * .008;
        for (let i = 0; i < 3; i++) {
          noise(t + i * gap, .01, out, 1200 + vp.tune * 2400, "bandpass");
        }
        noise(t + gap * 3, .06 + vp.decay * .08, out, 1800 + vp.tune * 1600, "bandpass");
      }},
      // 7: Zap — fast sine sweep upward
      { play(ctx, t, vp, force, out) {
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(80 + vp.tune * 60, t);
        osc.frequency.exponentialRampToValueAtTime(1200 + vp.tune * 3000, t + .04 + vp.decay * .06);
        osc.connect(out); osc.start(t); osc.stop(t + .08 + vp.decay * .1);
      }},
      // 8: Cow — two detuned squares, bandpass
      { play(ctx, t, vp, force, out) {
        const f = 540 + vp.tune * 220;
        const filter = ctx.createBiquadFilter();
        filter.type = "bandpass"; filter.frequency.value = f * 2; filter.Q.value = 8;
        filter.connect(out);
        const o1 = ctx.createOscillator(); o1.type = "square"; o1.frequency.value = f;
        const o2 = ctx.createOscillator(); o2.type = "square"; o2.frequency.value = f * 1.504;
        o1.connect(filter); o2.connect(filter);
        o1.start(t); o2.start(t);
        o1.stop(t + .06 + vp.decay * .12); o2.stop(t + .06 + vp.decay * .12);
      }},
      // 9: FM — metallic FM hit
      { play(ctx, t, vp, force, out) {
        const carrier = ctx.createOscillator();
        const mod = ctx.createOscillator();
        const modGain = ctx.createGain();
        const cFreq = 180 + vp.tune * 400;
        carrier.frequency.value = cFreq;
        mod.frequency.value = cFreq * (1.5 + vp.grit * 6);
        modGain.gain.setValueAtTime(cFreq * (2 + vp.tune * 8), t);
        modGain.gain.exponentialRampToValueAtTime(1, t + .05 + vp.decay * .15);
        mod.connect(modGain); modGain.connect(carrier.frequency);
        carrier.connect(out);
        mod.start(t); carrier.start(t);
        mod.stop(t + .2 + vp.decay * .2); carrier.stop(t + .2 + vp.decay * .2);
      }}
    ];

    function playSampleEngine(ctx, t, vp, force, out) {
      const slotIndex = vp.engine - SYNTH_COUNT;
      const buf = state.sampleBuffers[slotIndex];
      if (!buf) return;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const rate = Math.pow(2, (vp.samplePitch - .5) * 4);
      src.playbackRate.value = rate;
      const startSec = vp.sampleStart * buf.duration;
      const endSec = vp.sampleEnd * buf.duration;
      const dur = Math.max(.001, endSec - startSec);
      src.connect(out);
      src.start(t, startSec, dur);
    }

    function playVoice(index, when = 0, accent = false, lockedParams = null) {
      initAudio();
      const t = when || state.ctx.currentTime;
      const vp = lockedParams || state.voiceParams[index];
      const force = accent ? 1.32 : 1;
      const baseDecay = [.42, .24, .08, .34, .03, .52, .14, .1, .08, .18];
      const di = Math.min(vp.engine, baseDecay.length - 1);
      const decay = baseDecay[di] * (.7 + vp.decay * .9);
      const out = envGain(t, .74 * force, decay);
      if (lockedParams && state.ctx) {
        const shaper = state.ctx.createWaveShaper();
        shaper.oversample = "2x";
        shaper.curve = curve(vp.grit);
        const echoSend = state.ctx.createGain();
        echoSend.gain.value = vp.echo * .42;
        shaper.connect(state.master);
        shaper.connect(echoSend);
        echoSend.connect(state.delay);
        out.connect(shaper);
      } else {
        out.connect(state.voiceShapers[index] || state.master);
      }

      if (vp.engine < SYNTH_COUNT) {
        synthEngines[vp.engine].play(state.ctx, t, vp, force, out);
      } else {
        playSampleEngine(state.ctx, t, vp, force, out);
      }

      pulsePad(index);
    }

    function noise(t, dur, dest, freq, type) {
      const len = Math.max(1, Math.floor(state.ctx.sampleRate * dur));
      const buf = state.ctx.createBuffer(1, len, state.ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      const src = state.ctx.createBufferSource();
      const filter = state.ctx.createBiquadFilter();
      filter.type = type;
      filter.frequency.value = freq;
      filter.Q.value = type === "bandpass" ? 1.8 : .45;
      src.buffer = buf;
      src.connect(filter);
      filter.connect(dest);
      src.start(t);
      src.stop(t + dur);
    }

    function click(t, dur, peak, dest) {
      const osc = state.ctx.createOscillator();
      const g = envGain(t, peak, dur);
      osc.type = "square";
      osc.frequency.value = 1100;
      osc.connect(g);
      g.connect(dest);
      osc.start(t);
      osc.stop(t + dur);
    }

    function synthSnare(t, vp, force, out) {
      const bodyFreq = 145 + vp.tune * 115;
      const body = state.ctx.createOscillator();
      const overtone = state.ctx.createOscillator();
      const bodyGain = state.ctx.createGain();
      const tailDur = .12 + vp.decay * .2;
      body.type = "triangle";
      overtone.type = "sine";
      body.frequency.setValueAtTime(bodyFreq * 1.18, t);
      body.frequency.exponentialRampToValueAtTime(bodyFreq, t + .045);
      overtone.frequency.setValueAtTime(bodyFreq * 1.74, t);
      bodyGain.gain.setValueAtTime(.0001, t);
      bodyGain.gain.exponentialRampToValueAtTime(.42 * force, t + .004);
      bodyGain.gain.exponentialRampToValueAtTime(.0001, t + .09 + vp.decay * .08);
      body.connect(bodyGain);
      overtone.connect(bodyGain);
      bodyGain.connect(out);
      body.start(t); overtone.start(t);
      body.stop(t + tailDur); overtone.stop(t + tailDur);

      noise(t, .09 + vp.decay * .18, out, 1700 + vp.tune * 2600, "bandpass");
      noise(t + .006, .05 + vp.decay * .12, out, 5200 + vp.grit * 3400, "highpass");
      click(t, .012, (.22 + vp.grit * .22) * force, out);
      click(t + .018, .008, .09 * force, out);
    }

    function engineCount() {
      return SYNTH_COUNT + SAMPLE_COUNT;
    }

    function enterSourceMode(voiceIndex) {
      initAudio();
      state.sourceMode = voiceIndex;
      state.selected = voiceIndex;
      machine.classList.add("source-mode");
      snapDials();
      renderScreen();
      render();
    }

    function exitSourceMode() {
      if (state.recording) stopRecording();
      state.sourceMode = null;
      machine.classList.remove("source-mode");
      snapDials();
      renderScreen();
    }

    function startRecording() {
      if (state.recording) return;
      initAudio();
      state.recording = true;
      state.recordChunks = [];
      machine.classList.add("recording");

      const scriptLen = 4096;
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        state.mediaStream = stream;
        const source = state.ctx.createMediaStreamSource(stream);
        const processor = state.ctx.createScriptProcessor(scriptLen, 1, 1);
        const startTime = state.ctx.currentTime;
        processor.onaudioprocess = e => {
          if (!state.recording) return;
          const input = e.inputBuffer.getChannelData(0);
          state.recordChunks.push(new Float32Array(input));
          // Max ~3 seconds
          if (state.ctx.currentTime - startTime > 3) stopRecording();
          else renderScreen();
        };
        source.connect(processor);
        processor.connect(state.ctx.destination); // needed for scriptProcessor to fire
        state.recorder = { source, processor };
      }).catch(() => {
        state.recording = false;
        machine.classList.remove("recording");
      });
    }

    function stopRecording() {
      if (!state.recording) return;
      state.recording = false;
      machine.classList.remove("recording");

      if (state.recorder) {
        state.recorder.processor.disconnect();
        state.recorder.source.disconnect();
        state.recorder = null;
      }
      if (state.mediaStream) {
        state.mediaStream.getTracks().forEach(t => t.stop());
        state.mediaStream = null;
      }

      if (state.recordChunks.length > 0) {
        // Combine chunks into a single AudioBuffer
        const totalLen = state.recordChunks.reduce((sum, c) => sum + c.length, 0);
        const buf = state.ctx.createBuffer(1, totalLen, state.ctx.sampleRate);
        const data = buf.getChannelData(0);
        let offset = 0;
        for (const chunk of state.recordChunks) {
          data.set(chunk, offset);
          offset += chunk.length;
        }
        // Normalize
        let peak = 0;
        for (let i = 0; i < data.length; i++) peak = Math.max(peak, Math.abs(data[i]));
        if (peak > 0.01) {
          const scale = .9 / peak;
          for (let i = 0; i < data.length; i++) data[i] *= scale;
        }

        // Store in next available slot
        const userSlot = state.nextSampleSlot % USER_SAMPLE_COUNT;
        const slot = ROM_SAMPLE_COUNT + userSlot;
        state.sampleBuffers[slot] = buf;
        state.nextSampleSlot = userSlot + 1;

        // Assign to current voice
        const vp = state.voiceParams[state.selected];
        vp.engine = SYNTH_COUNT + slot;
        vp.sampleStart = 0;
        vp.sampleEnd = 1;
        vp.samplePitch = .5;
      }
      state.recordChunks = [];
      snapDials();
      renderScreen();
    }

    function render() {
      matrix.innerHTML = "";

      if (state.sourceMode !== null) {
        renderSourceGrid();
      } else {
        renderSequencerGrid();
      }

      banks.innerHTML = "";
      state.banks.forEach((bank, index) => {
        const b = document.createElement("button");
        b.className = "bank" + (index === state.activeBank ? " active" : "");
        b.style.setProperty("--bank-color", bankColors[index]);
        b.style.setProperty("--bank-turn", `${index * 36 - 20}deg`);
        b.style.setProperty("--bank-radius", index % 2 ? "24%" : "50%");
        b.addEventListener("pointerdown", e => {
          e.preventDefault();
          loadBank(index);
        });
        banks.appendChild(b);
      });

      renderScreen();
    }

    function renderSequencerGrid() {
      voices.forEach((voice, row) => {
        const wrap = document.createElement("div");
        wrap.className = "row";
        wrap.style.setProperty("--c", voice.color);
        const v = document.createElement("button");
        v.className = "voice" + (state.selected === row ? " selected" : "");
        v.style.setProperty("--c", voice.color);
        v.style.setProperty("--shape", voice.shape);
        v.addEventListener("pointerdown", e => {
          e.preventDefault();
          if (e.altKey) {
            enterSourceMode(row);
            return;
          }
          state.selected = row;
          snapDials();
          playVoice(row);
          render();
        });
        wrap.appendChild(v);
        state.steps[row].forEach((active, col) => {
          const s = document.createElement("button");
          const lockActive = Object.keys(state.locks[row][col]).length > 0;
          const probability = state.probabilities[row][col];
          s.className = "step" +
            (active ? " on" : "") +
            (state.accents[row][col] ? " accent" : "") +
            (state.current === col ? " now" : "") +
            (lockActive ? " locked" : "") +
            (probability < 1 ? " chance" : "");
          s.style.setProperty("--chance", probability);
          s.style.setProperty("--c", voice.color);
          s.addEventListener("pointerdown", e => {
            e.preventDefault();
            if (e.shiftKey) {
              cycleProbability(row, col);
            } else if (e.detail > 1 || e.altKey) {
              toggleAccent(row, col);
            } else {
              toggleStep(row, col);
            }
          });
          wrap.appendChild(s);
        });
        matrix.appendChild(wrap);
      });
    }

    function renderSourceGrid() {
      const voiceColor = voices[state.sourceMode].color;
      const vp = state.voiceParams[state.sourceMode];
      const total = engineCount();

      for (let row = 0; row < 4; row++) {
        const wrap = document.createElement("div");
        wrap.className = "row";
        wrap.style.setProperty("--c", voiceColor);

        // Voice button — pointerdown stays responsive while playback re-renders the grid.
        const v = document.createElement("button");
        v.className = "voice" + (state.sourceMode === row ? " selected" : "");
        v.style.setProperty("--c", voices[row].color);
        v.style.setProperty("--shape", voices[row].shape);
        v.addEventListener("pointerdown", e => {
          e.preventDefault();
          if (e.altKey && row !== state.sourceMode) {
            enterSourceMode(row);
          } else {
            exitSourceMode();
            state.selected = row;
            snapDials();
            render();
          }
        });
        wrap.appendChild(v);

        // 16 engine/sample slots per row
        for (let col = 0; col < 16; col++) {
          const engineIdx = row * 16 + col;
          const s = document.createElement("button");
          s.style.setProperty("--c", voiceColor);

          if (engineIdx < SYNTH_COUNT) {
            // Synth engine slot
            s.className = "step source-slot synth-slot" + (vp.engine === engineIdx ? " on" : "");
            s.addEventListener("click", () => {
              vp.engine = engineIdx;
              playVoice(state.sourceMode);
              render();
            });
          } else if (engineIdx < SYNTH_COUNT + SAMPLE_COUNT) {
            // Sample slot
            const slotIdx = engineIdx - SYNTH_COUNT;
            const hasSample = !!state.sampleBuffers[slotIdx];
            const isUserSlot = slotIdx >= ROM_SAMPLE_COUNT;
            s.className = "step source-slot sample-slot" +
              (hasSample ? " has-sample" : " empty-slot") +
              (vp.engine === engineIdx ? " on" : "");
            s.addEventListener("click", () => {
              if (hasSample) {
                vp.engine = engineIdx;
                playVoice(state.sourceMode);
                render();
              }
            });
            if (isUserSlot) {
              // Drag and drop support
              s.addEventListener("dragover", e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
                s.classList.add("drag-over");
              });
              s.addEventListener("dragleave", () => s.classList.remove("drag-over"));
              s.addEventListener("drop", e => {
                e.preventDefault();
                s.classList.remove("drag-over");
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith("audio/")) {
                  loadAudioFile(file, slotIdx);
                }
              });
            }
          } else {
            // Beyond available slots — inactive
            s.className = "step source-slot inactive-slot";
          }
          wrap.appendChild(s);
        }
        matrix.appendChild(wrap);
      }
    }

    function loadAudioFile(file, slotIdx) {
      initAudio();
      const reader = new FileReader();
      reader.onload = () => {
        state.ctx.decodeAudioData(reader.result).then(buf => {
          normalizeBuffer(buf);
          state.sampleBuffers[slotIdx] = buf;
          // Auto-assign to current voice if in source mode
          if (state.sourceMode !== null) {
            state.voiceParams[state.sourceMode].engine = SYNTH_COUNT + slotIdx;
            state.voiceParams[state.sourceMode].sampleStart = 0;
            state.voiceParams[state.sourceMode].sampleEnd = 1;
            state.voiceParams[state.sourceMode].samplePitch = .5;
            playVoice(state.sourceMode);
          }
          render();
        });
      };
      reader.readAsArrayBuffer(file);
    }

    function renderScreen() {
      screenBars.innerHTML = "";
      screenBars.style.setProperty("--bank-color", bankColors[state.activeBank]);
      const vi = state.sourceMode !== null ? state.sourceMode : state.selected;
      const vp = state.voiceParams[vi];
      const voiceColor = voices[vi].color;

      if (state.sourceMode !== null) {
        // Source mode: bars 1-2 normal, bars 3-6 merge into waveform preview
        const globals = [(state.tempo - 70) / 110, state.swing];
        globals.forEach((level, i) => {
          const bar = document.createElement("i");
          bar.className = "screen-bar";
          bar.appendChild(makeParamGlyph(i, clamp01(level)));
          screenBars.appendChild(bar);
        });
        // Merged preview panel spanning bars 3-6
        const preview = document.createElement("i");
        preview.className = "screen-bar source-preview";
        preview.style.setProperty("--voice-color", voiceColor);
        preview.style.gridColumn = "3 / 7";
        preview.appendChild(makeSourcePreview(vp, voiceColor));
        screenBars.appendChild(preview);
        return;
      }

      // Normal mode
      const levels = [
        (state.tempo - 70) / 110,
        state.swing,
        vp.tune,
        vp.decay,
        vp.grit,
        vp.echo
      ];
      levels.forEach((level, i) => {
        const bar = document.createElement("i");
        bar.className = "screen-bar";
        if (i >= 2) {
          bar.classList.add("voice-tinted");
          bar.style.setProperty("--voice-color", voiceColor);
        }
        const p = Math.min(1, Math.max(0, level));
        bar.appendChild(makeParamGlyph(i, p));
        screenBars.appendChild(bar);
      });
    }

    function makeSourcePreview(vp, color) {
      const svg = makeSvg();
      svg.setAttribute("viewBox", "0 0 200 100");
      svg.setAttribute("preserveAspectRatio", "none");

      // Border frame
      addSvg(svg, "rect", { class: "limit", x: 4, y: 4, width: 192, height: 92, rx: 3 });

      // Live recording waveform
      if (state.recording && state.recordChunks.length > 0) {
        const allData = state.recordChunks;
        const totalLen = allData.reduce((s, c) => s + c.length, 0);
        const maxSamples = state.ctx.sampleRate * 3;
        const progress = Math.min(1, totalLen / maxSamples);
        const pts = [];
        const steps = 120;
        for (let i = 0; i < steps; i++) {
          const t = i / (steps - 1);
          if (t > progress) break;
          const sampleIdx = Math.floor(t * totalLen);
          let chunkOffset = 0, val = 0;
          for (const chunk of allData) {
            if (sampleIdx < chunkOffset + chunk.length) {
              val = chunk[sampleIdx - chunkOffset];
              break;
            }
            chunkOffset += chunk.length;
          }
          pts.push(`${(8 + t * 184).toFixed(1)},${(50 - val * 38).toFixed(1)}`);
        }
        if (pts.length > 1) {
          addSvg(svg, "polyline", { class: "shape", points: pts.join(" "), fill: "none", style: `stroke: ${color}` });
        }
        // Progress bar
        addSvg(svg, "rect", { x: 8, y: 88, width: Math.round(progress * 184), height: 3, rx: 1, style: `fill: ${color}; opacity: .6` });
        return svg;
      }

      if (vp.engine < SYNTH_COUNT) {
        // Synth engine identity waveform
        const pts = makeSynthWaveform(vp.engine, vp);
        addSvg(svg, "polyline", {
          class: "shape",
          points: pts,
          fill: "none",
          style: `stroke: ${color}`
        });
        // Engine position indicator (dots at bottom)
        const total = engineCount();
        for (let i = 0; i < Math.min(total, 34); i++) {
          const x = 14 + (i / Math.max(1, total - 1)) * 172;
          addSvg(svg, "circle", {
            cx: x, cy: 92,
            r: i === vp.engine ? 3 : 1.5,
            class: i === vp.engine ? "shape fill" : "ghost",
            style: i === vp.engine ? `fill: ${color}; stroke: ${color}` : ""
          });
        }
      } else {
        // Sample waveform
        const slotIndex = vp.engine - SYNTH_COUNT;
        const buf = state.sampleBuffers[slotIndex];
        if (buf) {
          const data = buf.getChannelData(0);
          const pts = [];
          const steps = 120;
          for (let i = 0; i < steps; i++) {
            const t = i / (steps - 1);
            const si = Math.floor(t * (data.length - 1));
            const x = 8 + t * 184;
            const y = 50 - data[si] * 38;
            pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
          }
          addSvg(svg, "polyline", { class: "shape", points: pts.join(" "), fill: "none", style: `stroke: ${color}` });
          // Start/end markers
          const sx = 8 + vp.sampleStart * 184;
          const ex = 8 + vp.sampleEnd * 184;
          addSvg(svg, "line", { x1: sx, y1: 8, x2: sx, y2: 92, class: "shape", style: `stroke: ${color}; opacity: .8` });
          addSvg(svg, "line", { x1: ex, y1: 8, x2: ex, y2: 92, class: "shape", style: `stroke: ${color}; opacity: .8` });
          // Highlight active region
          addSvg(svg, "rect", {
            x: sx, y: 8, width: Math.max(1, ex - sx), height: 84,
            style: `fill: ${color}; opacity: .08`, rx: 2
          });
        } else {
          // Empty sample slot
          addSvg(svg, "line", { class: "ghost", x1: 30, y1: 50, x2: 170, y2: 50 });
          addSvg(svg, "circle", { class: "ghost", cx: 100, cy: 50, r: 12 });
        }
        // Engine position indicator
        const total = engineCount();
        for (let i = 0; i < Math.min(total, 34); i++) {
          const x = 14 + (i / Math.max(1, total - 1)) * 172;
          addSvg(svg, "circle", {
            cx: x, cy: 92,
            r: i === vp.engine ? 3 : 1.5,
            class: i === vp.engine ? "shape fill" : "ghost",
            style: i === vp.engine ? `fill: ${color}; stroke: ${color}` : ""
          });
        }
      }
      return svg;
    }

    function makeSynthWaveform(engineIndex, vp) {
      const pts = [];
      const n = 100;
      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        const x = 8 + t * 184;
        let y = 50;
        switch (engineIndex) {
          case 0: // Kick: decaying sine
            y = 50 - Math.sin(t * 8 + vp.tune * 4) * 36 * Math.exp(-t * 4);
            break;
          case 1: // Snare: body knock plus wire tail
            y = 50 - (
              Math.sin(t * 22 + vp.tune * 2) * 20 * Math.exp(-t * 8) +
              Math.sin(t * 74) * 10 * Math.exp(-t * 5) +
              (Math.random() - .5) * 26 * Math.exp(-t * 4.5)
            );
            break;
          case 2: // Hat: dense high freq hash
            y = 50 - (Math.random() - .5) * 28 * Math.exp(-t * 8);
            break;
          case 3: // Perc: descending triangle blip
            y = 50 - Math.abs(((t * 16 + vp.tune * 4) % 2) - 1) * 32 * Math.exp(-t * 3.5);
            break;
          case 4: // Rim: single sharp spike
            y = 50 - Math.exp(-Math.pow((t - .08) * 28, 2)) * 40;
            break;
          case 5: // Tom: deeper sine decay
            y = 50 - Math.sin(t * 5 + vp.tune * 3) * 38 * Math.exp(-t * 2.5);
            break;
          case 6: // Clap: stacked bursts
            { const burst = (p, w) => Math.exp(-Math.pow((t - p) * 50, 2)) * w;
              y = 50 - (burst(.05, 25) + burst(.1, 28) + burst(.15, 22) + burst(.22, 36)) * (Math.random() * .4 + .6); }
            break;
          case 7: // Zap: ascending sweep
            y = 50 - Math.sin(t * t * 80) * 30 * (1 - t * .7);
            break;
          case 8: // Cow: dual frequency beating
            y = 50 - (Math.sin(t * 24) + Math.sin(t * 24 * 1.504)) * 16 * Math.exp(-t * 3);
            break;
          case 9: // FM: complex harmonics
            y = 50 - Math.sin(t * 14 + Math.sin(t * 42) * (3 - t * 8)) * 30 * Math.exp(-t * 3);
            break;
        }
        pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
      }
      return pts.join(" ");
    }

    function point(cx, cy, r, angle) {
      const a = (angle - 90) * Math.PI / 180;
      return `${(cx + Math.cos(a) * r).toFixed(1)},${(cy + Math.sin(a) * r).toFixed(1)}`;
    }

    function polygonPoints(sides, radius, spin = 0, cx = 50, cy = 50) {
      return Array.from({ length: sides }, (_, i) => point(cx, cy, radius, spin + i * 360 / sides)).join(" ");
    }

    function starPoints(points, inner, outer, spin = 0) {
      return Array.from({ length: points * 2 }, (_, i) => point(50, 50, i % 2 ? inner : outer, spin + i * 180 / points)).join(" ");
    }

    function polarPath(turns, radius, spin = 0) {
      const count = 22;
      return Array.from({ length: count }, (_, i) => {
        const p = i / (count - 1);
        const r = radius * p;
        const a = spin + p * 360 * turns;
        return `${i ? "L" : "M"}${point(50, 50, r, a)}`;
      }).join(" ");
    }

    function makeSvg() {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 100 100");
      svg.setAttribute("aria-hidden", "true");
      return svg;
    }

    function addSvg(svg, tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      svg.appendChild(el);
      return el;
    }

    function makeParamGlyph(index, p) {
      const svg = makeSvg();
      addSvg(svg, "rect", { class: "limit", x: 14, y: 14, width: 72, height: 72, rx: 4 });
      if (p <= .015) return svg;
      if (index === 0) {
        const sides = 3 + Math.round(p * 9);
        const radius = 5 + p * 29;
        addSvg(svg, "polygon", { class: "shape", points: polygonPoints(sides, radius, p * 120) });
      } else if (index === 1) {
        const r = 29;
        if (p >= .985) {
          addSvg(svg, "circle", { class: "shape", cx: 50, cy: 50, r });
        } else {
          const sweep = p * 359;
          const start = point(50, 50, r, -90);
          const end = point(50, 50, r, -90 + sweep);
          addSvg(svg, "path", { class: "shape", d: `M${start} A${r} ${r} 0 ${sweep > 180 ? 1 : 0} 1 ${end}` });
        }
      } else if (index === 2) {
        const teeth = 3 + Math.round(p * 7);
        addSvg(svg, "polygon", { class: "shape", points: starPoints(teeth, 4 + p * 10, 8 + p * 22, p * 180) });
      } else if (index === 3) {
        const height = 3 + p * 62;
        addSvg(svg, "rect", { class: "shape fill", x: 29, y: 82 - height, width: 42, height, rx: 3 });
        addSvg(svg, "line", { class: "limit", x1: 25, y1: 18, x2: 75, y2: 18 });
      } else if (index === 4) {
        const turns = 0.12 + p * 2.7;
        addSvg(svg, "path", { class: "shape", d: polarPath(turns, 6 + p * 25, p * 240) });
      } else {
        const amp = 2 + p * 22;
        const turns = 1.1 + p * 1.6;
        const count = 18;
        const left = [];
        const right = [];
        for (let n = 0; n < count; n++) {
          const t = n / (count - 1);
          const y = 18 + t * 64;
          const wave = Math.sin(t * Math.PI * 2 * turns);
          left.push(`${n ? "L" : "M"}${(50 - wave * amp).toFixed(1)},${y.toFixed(1)}`);
          right.push(`${n ? "L" : "M"}${(50 + wave * amp).toFixed(1)},${y.toFixed(1)}`);
          if (n % 3 === 0) {
            addSvg(svg, "line", {
              class: "limit",
              x1: (50 - wave * amp).toFixed(1),
              y1: y.toFixed(1),
              x2: (50 + wave * amp).toFixed(1),
              y2: y.toFixed(1)
            });
          }
        }
        addSvg(svg, "path", { class: "shape", d: left.join(" ") });
        addSvg(svg, "path", { class: "shape", d: right.join(" ") });
      }
      return svg;
    }

    function toggleStep(row, col) {
      state.steps[row][col] = !state.steps[row][col];
      if (!state.steps[row][col]) {
        state.accents[row][col] = false;
        state.probabilities[row][col] = 1;
        state.locks[row][col] = {};
        state.lockTarget = null;
      } else {
        state.lockTarget = { row, col, expires: performance.now() + 2500 };
      }
      state.selected = row;
      snapDials();
      if (state.steps[row][col]) playVoice(row, 0, state.accents[row][col]);
      storeBank();
      render();
    }

    function toggleAccent(row, col) {
      state.steps[row][col] = true;
      state.accents[row][col] = !state.accents[row][col];
      state.lockTarget = { row, col, expires: performance.now() + 2500 };
      state.selected = row;
      snapDials();
      playVoice(row, 0, state.accents[row][col]);
      storeBank();
      render();
    }

    function cycleProbability(row, col) {
      state.steps[row][col] = true;
      const options = [1, .75, .5, .25];
      const current = state.probabilities[row][col];
      const next = options[(options.findIndex(v => Math.abs(v - current) < .01) + 1) % options.length];
      state.probabilities[row][col] = next;
      state.lockTarget = { row, col, expires: performance.now() + 2500 };
      state.selected = row;
      snapDials();
      playVoice(row, 0, state.accents[row][col]);
      storeBank();
      render();
    }

    function pulsePad(index) {
      const pads = [...document.querySelectorAll(".voice")];
      if (!pads[index]) return;
      pads[index].classList.add("selected");
      window.setTimeout(() => render(), 72);
    }

    function stepInterval(step) {
      const beat = 60 / state.tempo / 4;
      const swingDepth = state.swing * .5;
      return step % 2 === 0 ? beat * (1 + swingDepth) : beat * (1 - swingDepth);
    }

    function paramsForStep(row, col) {
      const locks = state.locks[row][col];
      return Object.keys(locks).length ? { ...state.voiceParams[row], ...locks } : null;
    }

    function scheduleStep(step, time) {
      state.steps.forEach((row, index) => {
        if (!row[step] || Math.random() > state.probabilities[index][step]) return;
        playVoice(index, time, state.accents[index][step], paramsForStep(index, step));
      });
      if (state.fill && step % 2 === 1) {
        playVoice(2, time + .03, true);
        if (step % 4 === 3) playVoice(state.selected, time + .06, true);
      }
      const delay = Math.max(0, (time - state.ctx.currentTime) * 1000);
      const visualTimer = window.setTimeout(() => {
        state.current = step;
        render();
      }, delay);
      state.visualTimers.push(visualTimer);
    }

    function scheduler() {
      while (state.nextStepTime < state.ctx.currentTime + .14) {
        scheduleStep(state.nextStep, state.nextStepTime);
        state.nextStepTime += stepInterval(state.nextStep);
        state.nextStep = (state.nextStep + 1) % 16;
      }
      state.timer = window.setTimeout(scheduler, 25);
    }

    function start() {
      initAudio();
      state.ctx.resume();
      if (state.playing) return;
      state.playing = true;
      machine.classList.add("playing");
      state.nextStep = (state.current + 1) % 16;
      state.nextStepTime = state.ctx.currentTime + .025;
      scheduler();
    }

    function stop() {
      state.playing = false;
      machine.classList.remove("playing");
      window.clearTimeout(state.timer);
      state.visualTimers.forEach(id => window.clearTimeout(id));
      state.visualTimers = [];
      render();
    }

    function randomize() {
      state.steps = voices.map((_, row) =>
        Array.from({ length: 16 }, (_, col) => {
          const anchor = row === 0 ? col % 4 === 0 : row === 1 ? col % 8 === 4 : false;
          return anchor || Math.random() < [.13, .16, .34, .18][row];
        })
      );
      state.accents = state.steps.map((row, r) => row.map((on, c) => on && (c + r + Math.floor(Math.random() * 3)) % 5 === 0));
      state.probabilities = state.steps.map(row => row.map(on => on && Math.random() < .18 ? .5 : 1));
      state.locks = emptyLockGrid();
      storeBank();
      render();
    }

    function clearAll() {
      state.steps = voices.map(() => Array(16).fill(false));
      state.accents = voices.map(() => Array(16).fill(false));
      state.probabilities = voices.map(() => Array(16).fill(1));
      state.locks = emptyLockGrid();
      storeBank();
      render();
    }

    function rotateSelected() {
      const row = state.selected;
      state.steps[row].unshift(state.steps[row].pop());
      state.accents[row].unshift(state.accents[row].pop());
      state.probabilities[row].unshift(state.probabilities[row].pop());
      state.locks[row].unshift(state.locks[row].pop());
      storeBank();
      render();
    }

    function storeBank() {
      state.banks[state.activeBank] = {
        steps: cloneGrid(state.steps),
        accents: cloneGrid(state.accents),
        probabilities: cloneGrid(state.probabilities),
        locks: cloneLockGrid(state.locks),
        voiceParams: state.voiceParams.map(vp => ({ ...vp }))
      };
    }

    function loadBank(index) {
      storeBank();
      state.activeBank = index;
      const bank = state.banks[index];
      state.steps = cloneGrid(bank.steps);
      state.accents = cloneGrid(bank.accents);
      state.probabilities = bank.probabilities ? cloneGrid(bank.probabilities) : voices.map(() => Array(16).fill(1));
      state.locks = bank.locks ? cloneLockGrid(bank.locks) : emptyLockGrid();
      if (bank.voiceParams) {
        state.voiceParams = bank.voiceParams.map(vp => ({ ...vp }));
      }
      updateFx();
      snapDials();
      render();
    }

    // In source mode with a sample engine, encoders remap: tune->sampleStart, decay->sampleEnd, grit->samplePitch
    const sampleDialMap = { tune: "sampleStart", decay: "sampleEnd", grit: "samplePitch" };

    function isSampleEngine(vp) { return vp.engine >= SYNTH_COUNT; }

    function activeLockTarget() {
      const target = state.lockTarget;
      if (!target || performance.now() > target.expires) {
        state.lockTarget = null;
        return null;
      }
      return state.steps[target.row]?.[target.col] ? target : null;
    }

    function setDial(el, value) {
      const name = el.dataset.dial;
      const isGlobal = name === "tempo" || name === "swing";
      const vi = state.sourceMode !== null ? state.sourceMode : state.selected;
      const vp = state.voiceParams[vi];
      const inSampleSource = state.sourceMode !== null && !isGlobal && isSampleEngine(vp) && name in sampleDialMap;

      if (inSampleSource) {
        const mapped = sampleDialMap[name];
        const clamped = clamp01(value);
        vp[mapped] = clamped;
        const p = clamped;
        el.style.setProperty("--r", `${-132 + p * 264}deg`);
        el.style.setProperty("--a", `${p * 74}%`);
        renderScreen();
        return;
      }

      const min = name === "tempo" ? 70 : 0;
      const max = name === "tempo" ? 180 : 1;
      const clamped = Math.min(max, Math.max(min, value));
      if (isGlobal) {
        state[name] = clamped;
      } else if (state.sourceMode === null && activeLockTarget()) {
        const target = activeLockTarget();
        state.locks[target.row][target.col][name] = clamped;
        state.lockTarget.expires = performance.now() + 2500;
        storeBank();
        render();
      } else {
        vp[name] = clamped;
        updateVoiceFx(vi);
      }
      const p = (clamped - min) / (max - min);
      el.style.setProperty("--r", `${-132 + p * 264}deg`);
      el.style.setProperty("--a", `${p * 74}%`);
      renderScreen();
    }

    function snapDials() {
      const vi = state.sourceMode !== null ? state.sourceMode : state.selected;
      const vp = state.voiceParams[vi];
      const inSampleSource = state.sourceMode !== null && isSampleEngine(vp);
      document.querySelectorAll('.dial').forEach(dial => {
        const name = dial.dataset.dial;
        if (name === "tempo" || name === "swing") return;
        let val;
        if (inSampleSource && name in sampleDialMap) {
          val = vp[sampleDialMap[name]];
        } else {
          val = vp[name];
        }
        const p = clamp01(val);
        dial.style.setProperty("--r", `${-132 + p * 264}deg`);
        dial.style.setProperty("--a", `${p * 74}%`);
      });
    }

    document.querySelectorAll("[data-act]").forEach(btn => {
      btn.addEventListener("click", () => {
        btn.classList.add("hot");
        window.setTimeout(() => btn.classList.remove("hot"), 130);
        // In source mode, mist button triggers recording instead of randomize
        if (btn.dataset.act === "random" && state.sourceMode !== null) {
          if (state.recording) stopRecording();
          else startRecording();
          return;
        }
        if (btn.dataset.act === "play") start();
        if (btn.dataset.act === "stop") stop();
        if (btn.dataset.act === "random") randomize();
        if (btn.dataset.act === "clear") clearAll();
        if (btn.dataset.act === "shift") rotateSelected();
      });
      btn.addEventListener("pointerdown", () => {
        if (btn.dataset.act === "fill") {
          state.fill = true;
          btn.classList.add("hot");
        }
      });
      btn.addEventListener("pointerup", () => {
        if (btn.dataset.act === "fill") {
          state.fill = false;
          btn.classList.remove("hot");
        }
      });
      btn.addEventListener("pointerleave", () => {
        if (btn.dataset.act === "fill") {
          state.fill = false;
          btn.classList.remove("hot");
        }
      });
    });

    document.querySelectorAll(".dial").forEach(dial => {
      const name = dial.dataset.dial;
      const isGlobal = name === "tempo" || name === "swing";
      const startValue = isGlobal ? state[name] : state.voiceParams[state.selected][name];
      setDial(dial, startValue);
      let dragging = false;
      let lastY = 0;
      const move = y => {
        const delta = (lastY - y) / 160;
        lastY = y;
        const vi = state.sourceMode !== null ? state.sourceMode : state.selected;
        const vp = state.voiceParams[vi];
        if (name === "tempo") setDial(dial, state.tempo + delta * 90);
        else if (name === "swing") setDial(dial, state.swing + delta);
        else if (state.sourceMode !== null && isSampleEngine(vp) && name in sampleDialMap) {
          setDial(dial, vp[sampleDialMap[name]] + delta);
        }
        else setDial(dial, vp[name] + delta);
      };
      dial.addEventListener("pointerdown", e => {
        dragging = true;
        lastY = e.clientY;
        dial.setPointerCapture(e.pointerId);
      });
      dial.addEventListener("pointermove", e => {
        if (dragging) move(e.clientY);
      });
      dial.addEventListener("pointerup", () => dragging = false);
      dial.addEventListener("pointercancel", () => dragging = false);
      dial.addEventListener("wheel", e => {
        e.preventDefault();
        move(lastY + Math.sign(e.deltaY) * 3.5);
      }, { passive: false });
    });

    window.addEventListener("pointermove", e => {
      const x = (e.clientX / window.innerWidth - .5) * 2;
      const y = (e.clientY / window.innerHeight - .5) * 2;
      machine.style.setProperty("--tilt-x", `${(x * 2.2).toFixed(2)}deg`);
      machine.style.setProperty("--tilt-y", `${(-y * 1.4).toFixed(2)}deg`);
    });

    window.addEventListener("keydown", e => {
      const keys = "1234qwerasdfzxcv";
      const i = keys.indexOf(e.key.toLowerCase());
      if (e.code === "Space") {
        e.preventDefault();
        state.playing ? stop() : start();
      }
      if (i >= 0) {
        const row = i % 4;
        playVoice(row);
        if (state.playing && state.current >= 0) {
          state.steps[row][state.current] = true;
          render();
        }
      }
    });

    render();
  </script>
</body>
</html>
